<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CV Builder — CV Maker</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ═══════════════════════════════════════════════════════
       TOKENS
    ═══════════════════════════════════════════════════════ */
      :root {
        --bg: #111111;
        --bg-2: #161616;
        --bg-3: #1c1c1c;
        --surface: #222222;
        --surface-2: #2a2a2a;
        --border: #2e2e2e;
        --border-lt: #3a3a3a;
        --ink: #f0ede8;
        --ink-2: #9a9590;
        --ink-3: #555250;
        --accent: #c94a1f;
        --accent-lt: #e06040;
        --accent-dim: rgba(201, 74, 31, 0.15);
        --radius: 5px;
        --radius-lg: 8px;
        --topbar-h: 56px;
        --form-w: 420px;
        --ease: cubic-bezier(0.25, 0.46, 0.45, 0.94);
        --dur: 180ms;
        --font-brand: "Playfair Display", Georgia, serif;
        --font-body: "DM Sans", system-ui, sans-serif;
        --text-xs: 0.6875rem;
        --text-sm: 0.75rem;
        --text-base: 0.875rem;
      }

      /* ═══════════════════════════════════════════════════════
       RESET
    ═══════════════════════════════════════════════════════ */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        font-size: 16px;
      }
      body {
        font-family: var(--font-body);
        font-size: var(--text-base);
        color: var(--ink);
        background: var(--bg);
        height: 100dvh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      /* ═══════════════════════════════════════════════════════
       TOPBAR
    ═══════════════════════════════════════════════════════ */
      .topbar {
        height: var(--topbar-h);
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 1.5rem;
        background: var(--bg-2);
        border-bottom: 1px solid var(--border);
        z-index: 100;
      }

      .topbar__left {
        display: flex;
        align-items: center;
        gap: 1rem;
      }

      .topbar__back {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        color: var(--ink-3);
        text-decoration: none;
        font-size: var(--text-xs);
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        transition: color var(--dur);
        padding: 0.4rem 0.6rem;
        border-radius: var(--radius);
      }
      .topbar__back:hover {
        color: var(--ink);
      }

      .topbar__divider {
        width: 1px;
        height: 20px;
        background: var(--border-lt);
      }

      .topbar__brand {
        font-family: var(--font-brand);
        font-size: 1.1rem;
        font-weight: 700;
        color: var(--ink);
        letter-spacing: -0.01em;
        user-select: none;
      }
      .topbar__brand span {
        color: var(--accent);
      }

      .topbar__actions {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }

      /* Mobile preview toggle */
      .btn-toggle-preview {
        display: none;
        align-items: center;
        gap: 0.4rem;
        padding: 0 1rem;
        height: 34px;
        border-radius: var(--radius);
        border: 1px solid var(--border-lt);
        background: transparent;
        color: var(--ink-2);
        font-family: var(--font-body);
        font-size: var(--text-xs);
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        cursor: pointer;
        transition: all var(--dur) var(--ease);
      }
      .btn-toggle-preview:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      .btn-download {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0 1.25rem;
        height: 34px;
        border-radius: var(--radius);
        border: none;
        background: var(--accent);
        color: #fff;
        font-family: var(--font-body);
        font-size: var(--text-xs);
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        cursor: pointer;
        transition:
          background var(--dur),
          box-shadow var(--dur),
          gap var(--dur);
        box-shadow: 0 2px 12px rgba(201, 74, 31, 0.3);
        white-space: nowrap;
      }
      .btn-download:hover {
        background: var(--accent-lt);
        box-shadow: 0 4px 20px rgba(201, 74, 31, 0.45);
        gap: 0.7rem;
      }
      .btn-download:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      /* ═══════════════════════════════════════════════════════
       WORKSPACE
    ═══════════════════════════════════════════════════════ */
      .workspace {
        flex: 1;
        display: grid;
        grid-template-columns: var(--form-w) 1fr;
        overflow: hidden;
      }

      /* ═══════════════════════════════════════════════════════
       FORM PANEL
    ═══════════════════════════════════════════════════════ */
      .panel--form {
        background: var(--bg-2);
        border-right: 1px solid var(--border);
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        scrollbar-width: thin;
        scrollbar-color: var(--border-lt) transparent;
      }
      .panel--form::-webkit-scrollbar {
        width: 4px;
      }
      .panel--form::-webkit-scrollbar-thumb {
        background: var(--border-lt);
        border-radius: 99px;
      }

      /* Section accordion style */
      .form-section {
        border-bottom: 1px solid var(--border);
      }

      .section-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 1rem 1.25rem;
        cursor: pointer;
        user-select: none;
        transition: background var(--dur);
      }
      .section-header:hover {
        background: var(--surface);
      }

      .section-header__left {
        display: flex;
        align-items: center;
        gap: 0.6rem;
      }

      .section-icon {
        width: 28px;
        height: 28px;
        border-radius: var(--radius);
        background: var(--surface-2);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.8rem;
        flex-shrink: 0;
      }

      .section-title {
        font-size: var(--text-sm);
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--ink-2);
      }

      .section-chevron {
        color: var(--ink-3);
        transition: transform var(--dur) var(--ease);
        flex-shrink: 0;
      }
      .form-section.open .section-chevron {
        transform: rotate(180deg);
      }

      .section-body {
        display: none;
        padding: 0 1.25rem 1.25rem;
        flex-direction: column;
        gap: 0.75rem;
      }
      .form-section.open .section-body {
        display: flex;
      }

      /* Add button */
      .btn-add {
        display: inline-flex;
        align-items: center;
        gap: 0.3rem;
        padding: 0.35rem 0.75rem;
        height: 26px;
        border-radius: var(--radius);
        border: 1px solid var(--border-lt);
        background: transparent;
        font-family: var(--font-body);
        font-size: var(--text-xs);
        font-weight: 600;
        letter-spacing: 0.06em;
        color: var(--ink-2);
        cursor: pointer;
        transition: all var(--dur) var(--ease);
      }
      .btn-add:hover {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }

      .section-header__right {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      /* ── Fields ─────────────────────────────────────────────── */
      .field-row {
        display: flex;
        gap: 0.6rem;
      }
      .field-row .field {
        flex: 1;
      }
      .field-row .field--half {
        flex: 0 0 80px;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 0.3rem;
      }

      .field label {
        font-size: var(--text-xs);
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--ink-3);
      }

      .field input,
      .field textarea,
      .field select {
        width: 100%;
        font-family: var(--font-body);
        font-size: var(--text-base);
        color: var(--ink);
        background: var(--surface);
        border: 1px solid var(--border-lt);
        border-radius: var(--radius);
        padding: 0.5rem 0.75rem;
        line-height: 1.5;
        transition:
          border-color var(--dur),
          background var(--dur),
          box-shadow var(--dur);
        outline: none;
        resize: vertical;
        appearance: none;
      }
      .field input::placeholder,
      .field textarea::placeholder {
        color: var(--ink-3);
        opacity: 0.6;
      }
      .field input:hover,
      .field textarea:hover,
      .field select:hover {
        border-color: var(--border-lt);
        background: var(--surface-2);
      }
      .field input:focus,
      .field textarea:focus,
      .field select:focus {
        border-color: var(--accent);
        background: var(--surface-2);
        box-shadow: 0 0 0 3px var(--accent-dim);
      }
      .field input[type="number"] {
        -moz-appearance: textfield;
        appearance: textfield;
      }
      .field input[type="number"]::-webkit-inner-spin-button {
        -webkit-appearance: none;
      }

      .hint {
        font-size: var(--text-xs);
        color: var(--ink-3);
        font-weight: 400;
        margin-left: 0.25rem;
      }

      /* ── Photo upload ────────────────────────────────────────── */
      .photo-row {
        display: flex;
        align-items: center;
        gap: 1rem;
      }
      .photo-circle {
        position: relative;
        width: 64px;
        height: 64px;
        border-radius: 50%;
        border: 2px dashed var(--border-lt);
        overflow: hidden;
        cursor: pointer;
        flex-shrink: 0;
        background: var(--surface);
        transition: border-color var(--dur);
      }
      .photo-circle:hover {
        border-color: var(--accent);
      }
      .photo-circle input {
        position: absolute;
        inset: 0;
        opacity: 0;
        cursor: pointer;
        width: 100%;
        height: 100%;
        z-index: 2;
      }
      .photo-circle__placeholder {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2px;
        pointer-events: none;
        z-index: 1;
      }
      .photo-circle__placeholder span {
        font-size: 0.55rem;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--ink-3);
      }
      #photo-preview-img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 50%;
        z-index: 1;
        display: none;
      }
      .btn-photo-remove {
        padding: 0.3rem 0.6rem;
        height: 24px;
        border-radius: var(--radius);
        border: 1px solid #422;
        background: transparent;
        color: #c55;
        font-size: var(--text-xs);
        font-weight: 600;
        cursor: pointer;
        display: none;
        transition: background var(--dur);
      }
      .btn-photo-remove:hover {
        background: rgba(200, 50, 50, 0.15);
      }

      /* ── Dynamic entries ─────────────────────────────────────── */
      .dyn-entries {
        display: flex;
        flex-direction: column;
        gap: 0.6rem;
      }
      .dyn-entry {
        background: var(--surface);
        border: 1px solid var(--border-lt);
        border-left: 3px solid var(--border-lt);
        border-radius: var(--radius);
        padding: 0.85rem;
        display: flex;
        flex-direction: column;
        gap: 0.6rem;
        animation: slideIn 160ms var(--ease) both;
        transition: border-left-color var(--dur);
      }
      .dyn-entry:focus-within {
        border-left-color: var(--accent);
      }
      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(-6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .dyn-entry__top {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .dyn-entry__label {
        font-size: var(--text-xs);
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--ink-3);
      }
      .dyn-entry__remove {
        width: 20px;
        height: 20px;
        border-radius: 3px;
        border: none;
        background: transparent;
        color: var(--ink-3);
        font-size: 10px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition:
          background var(--dur),
          color var(--dur);
      }
      .dyn-entry__remove:hover {
        background: rgba(200, 50, 50, 0.15);
        color: #c55;
      }

      /* ═══════════════════════════════════════════════════════
       PREVIEW PANEL
    ═══════════════════════════════════════════════════════ */
      .panel--preview {
        background: #0d0d0d;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* ── Customise toolbar (color + font) ───────────────────── */
      .customise-bar {
        display: flex;
        align-items: center;
        gap: 1.5rem;
        padding: 0.65rem 1.25rem;
        background: var(--bg-3);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
        flex-wrap: wrap;
      }

      .cbar-group {
        display: flex;
        align-items: center;
        gap: 0.6rem;
      }
      .cbar-label {
        font-size: var(--text-xs);
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--ink-3);
        white-space: nowrap;
      }

      /* Color picker */
      .color-picker-wrap {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .color-picker-btn {
        position: relative;
        width: 32px;
        height: 32px;
        border-radius: var(--radius);
        border: 2px solid var(--border-lt);
        cursor: pointer;
        overflow: hidden;
        transition:
          border-color var(--dur),
          transform 0.15s;
        flex-shrink: 0;
      }
      .color-picker-btn:hover {
        border-color: var(--ink-2);
        transform: scale(1.08);
      }
      .color-picker-btn input[type="color"] {
        position: absolute;
        inset: -4px;
        width: calc(100% + 8px);
        height: calc(100% + 8px);
        border: none;
        padding: 0;
        cursor: pointer;
        opacity: 0;
      }
      .color-picker-preview {
        position: absolute;
        inset: 2px;
        border-radius: 2px;
        pointer-events: none;
      }
      .color-hex {
        font-size: 0.65rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        color: var(--ink-2);
        font-family: monospace;
        min-width: 52px;
      }

      /* Font select */
      .font-select-wrap {
        position: relative;
      }
      .font-select-wrap::after {
        content: "▾";
        position: absolute;
        right: 0.6rem;
        top: 50%;
        transform: translateY(-50%);
        color: var(--ink-3);
        font-size: 0.65rem;
        pointer-events: none;
      }
      .font-select {
        appearance: none;
        -webkit-appearance: none;
        background: var(--surface);
        border: 1px solid var(--border-lt);
        border-radius: var(--radius);
        color: var(--ink);
        font-size: 0.8rem;
        padding: 0.35rem 1.75rem 0.35rem 0.65rem;
        cursor: pointer;
        outline: none;
        transition: border-color var(--dur);
        min-width: 140px;
      }
      .font-select:hover {
        border-color: var(--accent);
      }
      .font-select:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-dim);
      }
      .font-select option {
        background: #222;
        color: var(--ink);
        padding: 0.3rem;
      }

      /* Change template button */
      .btn-change-tpl {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0 0.9rem;
        height: 34px;
        border-radius: var(--radius);
        border: 1px solid var(--border-lt);
        background: transparent;
        color: var(--ink-2);
        font-family: var(--font-body);
        font-size: var(--text-xs);
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        cursor: pointer;
        transition: all var(--dur) var(--ease);
        white-space: nowrap;
      }
      .btn-change-tpl:hover {
        border-color: var(--ink-2);
        color: var(--ink);
      }

      /* ── Template switcher modal ─────────────────────────────── */
      .tpl-modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.85);
        backdrop-filter: blur(8px);
        z-index: 500;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.25s ease;
      }
      .tpl-modal-overlay.open {
        opacity: 1;
        pointer-events: all;
      }

      .tpl-modal {
        width: 100%;
        max-width: 900px;
        height: 80dvh;
        display: flex;
        flex-direction: column;
        gap: 0;
      }

      .tpl-modal__head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 1rem 1rem;
        flex-shrink: 0;
      }
      .tpl-modal__title {
        font-family: var(--font-brand);
        font-size: 1.2rem;
        font-weight: 700;
        color: var(--ink);
        letter-spacing: -0.01em;
      }
      .tpl-modal__title span {
        color: var(--accent);
      }
      .tpl-modal__close {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border: 1px solid var(--border-lt);
        background: transparent;
        color: var(--ink-2);
        font-size: 1rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all var(--dur);
      }
      .tpl-modal__close:hover {
        background: var(--surface-2);
        color: var(--ink);
      }

      /* Carousel inside modal */
      .tpl-modal__stage {
        flex: 1;
        display: grid;
        grid-template-columns: 56px 1fr 56px;
        align-items: center;
        overflow: hidden;
      }

      .modal-arrow {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border-lt);
        background: rgba(255, 255, 255, 0.04);
        color: var(--ink-2);
        cursor: pointer;
        margin: auto;
        transition: all 0.2s;
      }
      .modal-arrow:hover {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
      }
      .modal-arrow:active {
        transform: scale(0.93);
      }

      .modal-track {
        position: relative;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      .modal-card {
        position: absolute;
        border-radius: 3px;
        overflow: hidden;
        cursor: pointer;
        transition:
          transform 0.5s cubic-bezier(0.22, 1, 0.36, 1),
          opacity 0.5s cubic-bezier(0.22, 1, 0.36, 1),
          filter 0.5s ease,
          box-shadow 0.5s ease;
        will-change: transform, opacity;
      }
      .modal-card img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: top;
        user-select: none;
        pointer-events: none;
      }
      .modal-card.is-active {
        z-index: 3;
        opacity: 1;
        filter: brightness(1);
        transform: translateX(0) scale(1);
        box-shadow:
          0 30px 70px rgba(0, 0, 0, 0.7),
          0 0 0 1px rgba(255, 255, 255, 0.06),
          0 0 50px rgba(201, 74, 31, 0.12);
      }
      .modal-card.is-active:hover {
        box-shadow:
          0 35px 80px rgba(0, 0, 0, 0.8),
          0 0 0 1px rgba(201, 74, 31, 0.3),
          0 0 60px rgba(201, 74, 31, 0.2);
      }
      .modal-card.is-prev {
        z-index: 2;
        opacity: 0.3;
        filter: brightness(0.45);
        transform: translateX(-50%) scale(0.78) rotateY(8deg);
        pointer-events: none;
      }
      .modal-card.is-next {
        z-index: 2;
        opacity: 0.3;
        filter: brightness(0.45);
        transform: translateX(50%) scale(0.78) rotateY(-8deg);
        pointer-events: none;
      }
      .modal-card.is-hidden {
        z-index: 1;
        opacity: 0;
        pointer-events: none;
        transform: scale(0.7);
      }

      .modal-card.anim-enter-right {
        animation: mEnterR 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      .modal-card.anim-enter-left {
        animation: mEnterL 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      @keyframes mEnterR {
        from {
          transform: translateX(70%) scale(0.75);
          opacity: 0;
        }
        to {
          transform: translateX(0) scale(1);
          opacity: 1;
        }
      }
      @keyframes mEnterL {
        from {
          transform: translateX(-70%) scale(0.75);
          opacity: 0;
        }
        to {
          transform: translateX(0) scale(1);
          opacity: 1;
        }
      }

      /* Bottom of modal */
      .tpl-modal__bottom {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.75rem;
        padding: 1rem 1rem 0;
        flex-shrink: 0;
      }
      .modal-dots {
        display: flex;
        gap: 0.4rem;
        align-items: center;
      }
      .modal-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--border-lt);
        cursor: pointer;
        transition:
          background 0.3s,
          width 0.3s;
      }
      .modal-dot.active {
        background: var(--accent);
        width: 18px;
        border-radius: 3px;
      }

      .tpl-modal__label {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.1rem;
      }
      .tpl-modal__label-num {
        font-size: 0.6rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--accent);
        font-weight: 600;
      }
      .tpl-modal__label-name {
        font-family: var(--font-brand);
        font-size: 1.1rem;
        font-weight: 700;
        color: var(--ink);
      }

      .btn-use-tpl {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.65rem 2rem;
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: var(--radius);
        font-family: var(--font-body);
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        cursor: pointer;
        transition:
          background 0.2s,
          box-shadow 0.2s;
        box-shadow: 0 4px 16px rgba(201, 74, 31, 0.3);
      }
      .btn-use-tpl:hover {
        background: var(--accent-lt);
        box-shadow: 0 6px 24px rgba(201, 74, 31, 0.45);
      }

      /* ── iframe area ─────────────────────────────────────────── */
      .preview-area {
        flex: 1;
        overflow: auto;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding: 2rem;
        background-image: radial-gradient(circle, #2a2a2a 1px, transparent 1px);
        background-size: 20px 20px;
        scrollbar-width: thin;
        scrollbar-color: var(--border-lt) transparent;
      }
      .preview-area::-webkit-scrollbar {
        width: 5px;
      }
      .preview-area::-webkit-scrollbar-thumb {
        background: var(--border-lt);
        border-radius: 99px;
      }

      .preview-scale-wrap {
        width: 794px;
        min-height: 1123px;
        transform-origin: top center;
        transform: scale(var(--preview-scale, 0.75));
        margin-bottom: calc(
          (1123px * (1 - var(--preview-scale, 0.75))) * -1 + 2rem
        );
        background: #fff;
        box-shadow:
          0 20px 60px rgba(0, 0, 0, 0.6),
          0 0 0 1px rgba(255, 255, 255, 0.04);
        border-radius: 2px;
        overflow: hidden;
      }

      #cv-preview {
        display: block;
        width: 794px;
        min-height: 1123px;
        border: none;
      }

      /* ═══════════════════════════════════════════════════════
       MOBILE
    ═══════════════════════════════════════════════════════ */
      @media (max-width: 820px) {
        body {
          overflow: auto;
        }

        .workspace {
          grid-template-columns: 1fr;
          grid-template-rows: auto auto;
          overflow: visible;
          height: auto;
        }

        .panel--form {
          overflow: visible;
          height: auto;
          border-right: none;
          border-bottom: 1px solid var(--border);
        }

        .panel--preview {
          min-height: 80vw;
          overflow: visible;
        }

        .preview-area {
          padding: 1.25rem;
          overflow: visible;
        }

        .preview-scale-wrap {
          width: 100%;
          transform: none;
          margin-bottom: 0;
          min-height: auto;
        }

        #cv-preview {
          width: 100%;
          min-height: 500px;
        }

        .btn-toggle-preview {
          display: inline-flex;
        }

        .topbar {
          padding: 0 1rem;
        }

        .customise-bar {
          gap: 1rem;
          padding: 0.6rem 1rem;
        }
      }

      @media (max-width: 480px) {
        :root {
          --form-w: 100vw;
        }
        .btn-download span {
          display: none;
        }
        .customise-bar {
          gap: 0.75rem;
        }
        .font-pill {
          font-size: 0.6rem;
          padding: 0.2rem 0.5rem;
        }
      }
    </style>
  </head>

    <script src="lib/html2pdf.bundle.min.js"></script>

    <script>
      "use strict";

      // ── Config ────────────────────────────────────────────────
      const TEMPLATES_DIR = "templates/";
      const DEBOUNCE_MS = 280;

      const FONTS = {
        playfair: {
          display: "'Playfair Display', Georgia, serif",
          body: "'DM Sans', system-ui, sans-serif",
          url: "https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap",
        },
        lato: {
          display: "'Lato', sans-serif",
          body: "'Lato', sans-serif",
          url: "https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap",
        },
        merriweather: {
          display: "'Merriweather', Georgia, serif",
          body: "'Lato', sans-serif",
          url: "https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Lato:wght@300;400&display=swap",
        },
        raleway: {
          display: "'Raleway', sans-serif",
          body: "'Raleway', sans-serif",
          url: "https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700&display=swap",
        },
        source: {
          display: "'Source Sans 3', sans-serif",
          body: "'Source Sans 3', sans-serif",
          url: "https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;600;700&display=swap",
        },
      };

      // ── State ─────────────────────────────────────────────────
      let currentTemplate = localStorage.getItem("selectedTemplate") || "cv001";
      let templateHTML = "";
      let photoDataURL = "";
      let accentColor = "#c94a1f";
      let currentFont = "playfair";
      let debounceTimer = null;

      // ── Elements ──────────────────────────────────────────────
      const iframe = document.getElementById("cv-preview");
      const scaleWrap = document.getElementById("preview-scale-wrap");
      const previewArea = document.getElementById("preview-area");
      const btnDownload = document.getElementById("btn-download");

      // ══════════════════════════════════════════════════════════
      //  BOOT
      // ══════════════════════════════════════════════════════════
      document.addEventListener("DOMContentLoaded", () => {
        loadTemplate(currentTemplate);
        bindAccordions();
        bindStaticInputs();
        bindDynamicAddButtons();
        bindPhotoUpload();
        bindColorPicker();
        bindFontSelect();
        bindChangeTplButton();
        initModal();
        bindDownload();
        addEntry("experience");
        addEntry("education");
        fitScale();
        window.addEventListener("resize", fitScale);
      });

      // ══════════════════════════════════════════════════════════
      //  TEMPLATE LOADING
      // ══════════════════════════════════════════════════════════
      async function loadTemplate(name) {
        try {
          const res = await fetch(`${TEMPLATES_DIR}${name}.html`);
          if (!res.ok) throw new Error(`${res.status}`);
          templateHTML = await res.text();
          scheduleUpdate();
        } catch (e) {
          console.error("[CV Maker] loadTemplate failed:", e);
          const errHTML =
            "<body style='padding:40px;font-family:sans-serif;color:#666'><h2>Template not found</h2><p>Make sure <strong>templates/" +
            name +
            ".html<\/strong> exists.<\/p><\/body>";
          updateIframe(errHTML);
        }
      }

      // ══════════════════════════════════════════════════════════
      //  DATA COLLECTION
      // ══════════════════════════════════════════════════════════
      function collectData() {
        const data = {};
        document.querySelectorAll("[data-token]").forEach((el) => {
          data[el.dataset.token] = el.value.trim();
        });
        data.skillsTechnical = splitComma(data.skillsTechnical);
        data.skillsTools = splitComma(data.skillsTools);
        data.interests = splitComma(data.interests);
        data.photo = photoDataURL || "";
        data.experience = collectEntries("experience", (e) => ({
          role: val(e, "role"),
          company: val(e, "company"),
          location: val(e, "location"),
          startDate: val(e, "startDate"),
          endDate: val(e, "endDate"),
          bullets: val(e, "bullets")
            .split("\n")
            .map((s) => s.trim())
            .filter(Boolean),
        }));
        data.education = collectEntries("education", (e) => ({
          degree: val(e, "degree"),
          school: val(e, "school"),
          year: val(e, "year"),
          detail: val(e, "detail"),
        }));
        data.languages = collectEntries("language", (e) => {
          const level = Math.min(
            5,
            Math.max(1, parseInt(val(e, "level")) || 3),
          );
          return {
            name: val(e, "name"),
            level,
            l1: level >= 1 ? "on" : "",
            l2: level >= 2 ? "on" : "",
            l3: level >= 3 ? "on" : "",
            l4: level >= 4 ? "on" : "",
            l5: level >= 5 ? "on" : "",
          };
        });
        data.certifications = collectEntries("certification", (e) => ({
          name: val(e, "name"),
          year: val(e, "year"),
        }));
        return data;
      }

      const val = (p, n) => {
        const el = p.querySelector(`[name="${n}"]`);
        return el ? el.value.trim() : "";
      };
      const splitComma = (s = "") =>
        s
          .split(",")
          .map((x) => x.trim())
          .filter(Boolean);
      function collectEntries(type, mapper) {
        const c = document.getElementById(`${type}-entries`);
        return c
          ? Array.from(
              c.querySelectorAll(`.dyn-entry[data-type="${type}"]`),
            ).map(mapper)
          : [];
      }

      // ══════════════════════════════════════════════════════════
      //  TEMPLATE RENDERER
      // ══════════════════════════════════════════════════════════
      function renderTemplate(html, data) {
        let out = html;
        out = out.replace(
          /\{\{#(\w+)\}\}([\s\S]*?)\{\{\/\1\}\}/g,
          (_, key, inner) => {
            const v = data[key];
            if (Array.isArray(v)) {
              if (!v.length) return "";
              return v.map((item) => renderBlock(inner, item, data)).join("");
            }
            if (v)
              return inner.replace(/\{\{(\w+)\}\}/g, (_, k) => {
                const x = data[k];
                if (x == null) return "";
                return Array.isArray(x)
                  ? x.map(esc).join(", ")
                  : esc(String(x));
              });
            return "";
          },
        );
        out = out.replace(/\{\{(\w+)\}\}/g, (_, key) => {
          const v = data[key];
          if (v == null) return "";
          if (Array.isArray(v)) return v.map(esc).join(", ");
          if (key === "photo") return String(v);
          return esc(String(v));
        });
        return out;
      }

      function renderBlock(inner, item, root) {
        let b = inner;
        b = b.replace(/\{\{#(\w+)\}\}([\s\S]*?)\{\{\/\1\}\}/g, (__, k, i2) => {
          const s = item[k];
          return Array.isArray(s) && s.length
            ? s.map((x) => i2.replace(/\{\{\.\}\}/g, esc(x))).join("")
            : "";
        });
        b = b.replace(/\{\{(\w+)\}\}/g, (__, k) => {
          const v =
            item[k] !== undefined
              ? item[k]
              : root[k] !== undefined
                ? root[k]
                : "";
          return Array.isArray(v) ? v.map(esc).join(", ") : esc(String(v));
        });
        return b;
      }

      function esc(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      // ══════════════════════════════════════════════════════════
      //  PREVIEW UPDATE
      // ══════════════════════════════════════════════════════════
      function scheduleUpdate() {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => {
          if (!templateHTML.trim()) return;
          let html = renderTemplate(templateHTML, collectData());
          html = injectCustomStyles(html);
          updateIframe(html);
        }, DEBOUNCE_MS);
      }

      function injectCustomStyles(html) {
        const font = FONTS[currentFont];
        const styleTag = "<" + "style>";
        const closeStyle = "<" + "/style>";
        const closeHead = "<" + "/head>";
        const style = `
      <link rel="stylesheet" href="${font.url}" />
      ${styleTag}
        :root {
          --cv-accent: ${accentColor} !important;
          --cv-accent-dim: ${accentColor}22 !important;
          --cv-font-display: ${font.display} !important;
          --cv-font-body: ${font.body} !important;
        }
        body, html { font-family: ${font.body} !important; }
        .cv-header__name, .cv-section-title, [class*="display"], h1, h2, h3 {
          font-family: ${font.display} !important;
        }
      ${closeStyle}
    `;
        return html.replace(closeHead, style + closeHead);
      }

      function updateIframe(html) {
        const doc = iframe.contentDocument || iframe.contentWindow?.document;
        if (!doc) return;
        doc.open();
        doc.write(html);
        doc.close();
        setTimeout(fitScale, 60);
      }

      // ══════════════════════════════════════════════════════════
      //  SCALE FIT
      // ══════════════════════════════════════════════════════════
      function fitScale() {
        const areaW = previewArea.clientWidth - 64;
        const scale = Math.max(0.3, Math.min(1, areaW / 794));
        scaleWrap.style.setProperty("--preview-scale", scale);
        const scaledH = 1123 * scale;
        scaleWrap.style.marginBottom = `${scaledH - 1123 + 32}px`;
      }

      // ══════════════════════════════════════════════════════════
      //  ACCORDION
      // ══════════════════════════════════════════════════════════
      function bindAccordions() {
        document.querySelectorAll("[data-toggle]").forEach((header) => {
          header.addEventListener("click", () => {
            header.closest(".form-section").classList.toggle("open");
          });
        });
      }

      // ══════════════════════════════════════════════════════════
      //  DYNAMIC ENTRIES
      // ══════════════════════════════════════════════════════════
      function addEntry(type) {
        const tpl = document.getElementById(`tpl-${type}`);
        const container = document.getElementById(`${type}-entries`);
        if (!tpl || !container) return;
        const clone = tpl.content.cloneNode(true);
        const entry = clone.querySelector(".dyn-entry");
        const count = container.querySelectorAll(".dyn-entry").length + 1;
        const lbl = entry.querySelector(".dyn-entry__label");
        if (lbl) lbl.textContent = `${cap(type)} ${count}`;
        entry
          .querySelector(".dyn-entry__remove")
          .addEventListener("click", () => {
            entry.remove();
            renumber(type);
            scheduleUpdate();
          });
        entry.addEventListener("input", scheduleUpdate);
        container.appendChild(entry);
        // Open the parent section
        const section = document.getElementById(`section-${type}`);
        if (section) section.classList.add("open");
      }

      function renumber(type) {
        const c = document.getElementById(`${type}-entries`);
        if (!c) return;
        c.querySelectorAll(".dyn-entry").forEach((el, i) => {
          const lbl = el.querySelector(".dyn-entry__label");
          if (lbl) lbl.textContent = `${cap(type)} ${i + 1}`;
        });
      }

      const cap = (s) => s.charAt(0).toUpperCase() + s.slice(1);

      function bindDynamicAddButtons() {
        document.querySelectorAll("[data-add]").forEach((btn) => {
          btn.addEventListener("click", (e) => {
            e.stopPropagation();
            addEntry(btn.dataset.add);
            scheduleUpdate();
          });
        });
      }

      // ══════════════════════════════════════════════════════════
      //  STATIC INPUTS
      // ══════════════════════════════════════════════════════════
      function bindStaticInputs() {
        document.querySelectorAll("[data-token]").forEach((el) => {
          el.addEventListener("input", scheduleUpdate);
        });
      }

      // ══════════════════════════════════════════════════════════
      //  PHOTO UPLOAD
      // ══════════════════════════════════════════════════════════
      function bindPhotoUpload() {
        const input = document.getElementById("f-photo");
        const preview = document.getElementById("photo-preview-img");
        const remove = document.getElementById("photo-remove");
        if (!input) return;
        input.addEventListener("change", () => {
          const file = input.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = (e) => {
            photoDataURL = e.target.result;
            if (preview) {
              preview.src = photoDataURL;
              preview.style.display = "block";
            }
            if (remove) remove.style.display = "inline-flex";
            scheduleUpdate();
          };
          reader.readAsDataURL(file);
        });
        remove?.addEventListener("click", () => {
          photoDataURL = "";
          input.value = "";
          if (preview) {
            preview.src = "";
            preview.style.display = "none";
          }
          remove.style.display = "none";
          scheduleUpdate();
        });
      }

      // ══════════════════════════════════════════════════════════
      //  COLOR PICKER
      // ══════════════════════════════════════════════════════════
      function bindColorPicker() {
        const input = document.getElementById("color-input");
        const preview = document.getElementById("color-preview");
        const hexLbl = document.getElementById("color-hex");
        if (!input) return;

        const apply = () => {
          accentColor = input.value;
          if (preview) preview.style.background = accentColor;
          if (hexLbl) hexLbl.textContent = accentColor.toUpperCase();
          scheduleUpdate();
        };

        input.addEventListener("input", apply);
        input.addEventListener("change", apply);

        // Click the preview box opens the picker
        document
          .getElementById("color-picker-btn")
          ?.addEventListener("click", () => input.click());
      }

      // ══════════════════════════════════════════════════════════
      //  FONT SELECT
      // ══════════════════════════════════════════════════════════
      function bindFontSelect() {
        const sel = document.getElementById("font-select");
        if (!sel) return;

        // Set font-family on each option so user sees it styled
        sel.querySelectorAll("option").forEach((opt) => {
          const f = FONTS[opt.value];
          if (f) opt.style.fontFamily = f.display;
        });

        // Update select's own font to match selection
        const applySelectFont = () => {
          const f = FONTS[sel.value];
          if (f) sel.style.fontFamily = f.display;
        };

        sel.addEventListener("change", () => {
          currentFont = sel.value;
          applySelectFont();
          scheduleUpdate();
        });

        applySelectFont();
      }

      // ══════════════════════════════════════════════════════════
      //  TEMPLATE SWITCHER MODAL
      // ══════════════════════════════════════════════════════════
      const TEMPLATES = [
        {
          id: "cv001",
          name: "Editorial",
          num: "01",
          img: "assets/images/cv001.png",
        },
        {
          id: "cv002",
          name: "Minimal",
          num: "02",
          img: "assets/images/cv002.png",
        },
        {
          id: "cv003",
          name: "Executive",
          num: "03",
          img: "assets/images/cv003.png",
        },
      ];

      let modalCurrent = 0;
      let modalAnimating = false;
      let modalCards = [];

      function initModal() {
        const track = document.getElementById("modal-track");
        const dotsWrap = document.getElementById("modal-dots");
        if (!track) return;

        // Find current template index
        modalCurrent = Math.max(
          0,
          TEMPLATES.findIndex((t) => t.id === currentTemplate),
        );

        // Build cards
        modalCards = TEMPLATES.map((tpl, i) => {
          const card = document.createElement("div");
          card.className = "modal-card";
          card.dataset.index = i;

          const img = document.createElement("img");
          img.src = tpl.img;
          img.alt = tpl.name;
          card.appendChild(img);

          card.addEventListener("click", () => {
            if (modalAnimating) return;
            if (parseInt(card.dataset.index) !== modalCurrent) return;
            applyTemplate(TEMPLATES[modalCurrent].id);
          });

          track.appendChild(card);
          return card;
        });

        // Size cards
        sizeModalCards();
        window.addEventListener("resize", sizeModalCards);

        // Build dots
        TEMPLATES.forEach((_, i) => {
          const d = document.createElement("div");
          d.className = "modal-dot" + (i === modalCurrent ? " active" : "");
          d.addEventListener("click", () =>
            modalGoTo(i, i > modalCurrent ? 1 : -1),
          );
          dotsWrap.appendChild(d);
        });

        renderModal();

        // Arrows
        document
          .getElementById("modal-prev")
          ?.addEventListener("click", () =>
            modalGoTo(
              (modalCurrent - 1 + TEMPLATES.length) % TEMPLATES.length,
              -1,
            ),
          );
        document
          .getElementById("modal-next")
          ?.addEventListener("click", () =>
            modalGoTo((modalCurrent + 1) % TEMPLATES.length, 1),
          );

        // Keyboard inside modal
        document.addEventListener("keydown", (e) => {
          const overlay = document.getElementById("tpl-modal-overlay");
          if (!overlay.classList.contains("open")) return;
          if (e.key === "ArrowLeft")
            modalGoTo(
              (modalCurrent - 1 + TEMPLATES.length) % TEMPLATES.length,
              -1,
            );
          if (e.key === "ArrowRight")
            modalGoTo((modalCurrent + 1) % TEMPLATES.length, 1);
          if (e.key === "Escape") closeModal();
          if (e.key === "Enter") applyTemplate(TEMPLATES[modalCurrent].id);
        });

        // Touch swipe
        let touchX = 0;
        track.addEventListener(
          "touchstart",
          (e) => {
            touchX = e.touches[0].clientX;
          },
          { passive: true },
        );
        track.addEventListener(
          "touchend",
          (e) => {
            const dx = e.changedTouches[0].clientX - touchX;
            if (Math.abs(dx) > 40)
              dx < 0
                ? modalGoTo((modalCurrent + 1) % TEMPLATES.length, 1)
                : modalGoTo(
                    (modalCurrent - 1 + TEMPLATES.length) % TEMPLATES.length,
                    -1,
                  );
          },
          { passive: true },
        );

        // Use button
        document
          .getElementById("btn-use-tpl")
          ?.addEventListener("click", () =>
            applyTemplate(TEMPLATES[modalCurrent].id),
          );

        // Close
        document
          .getElementById("modal-close")
          ?.addEventListener("click", closeModal);
        document
          .getElementById("tpl-modal-overlay")
          ?.addEventListener("click", (e) => {
            if (e.target === e.currentTarget) closeModal();
          });
      }

      function sizeModalCards() {
        const track = document.getElementById("modal-track");
        if (!track || !modalCards.length) return;
        const h = Math.min(track.clientHeight * 0.9, 560);
        const w = Math.min(h / 1.4142, track.clientWidth * 0.5, 360);
        modalCards.forEach((c) => {
          c.style.width = Math.round(w) + "px";
          c.style.height = Math.round(w * 1.4142) + "px";
        });
      }

      function renderModal() {
        const n = TEMPLATES.length;
        const prev = (modalCurrent - 1 + n) % n;
        const next = (modalCurrent + 1) % n;
        const dots = document.querySelectorAll(".modal-dot");

        modalCards.forEach((c, i) => {
          c.classList.remove("is-active", "is-prev", "is-next", "is-hidden");
          if (i === modalCurrent) c.classList.add("is-active");
          else if (i === prev) c.classList.add("is-prev");
          else if (i === next) c.classList.add("is-next");
          else c.classList.add("is-hidden");
        });

        document.getElementById("modal-lbl-num").textContent =
          "Template " + TEMPLATES[modalCurrent].num;
        document.getElementById("modal-lbl-name").textContent =
          TEMPLATES[modalCurrent].name;
        dots.forEach((d, i) =>
          d.classList.toggle("active", i === modalCurrent),
        );
      }

      function modalGoTo(index, dir) {
        if (modalAnimating || index === modalCurrent) return;
        modalAnimating = true;

        const oldCard = modalCards[modalCurrent];
        const newCard = modalCards[index];

        oldCard.classList.remove("anim-enter-right", "anim-enter-left");

        newCard.classList.remove(
          "is-hidden",
          "is-prev",
          "is-next",
          "is-active",
          "anim-enter-right",
          "anim-enter-left",
        );
        newCard.classList.add(dir > 0 ? "anim-enter-right" : "anim-enter-left");

        modalCurrent = index;
        renderModal();

        setTimeout(() => {
          newCard.classList.remove("anim-enter-right", "anim-enter-left");
          modalAnimating = false;
        }, 520);
      }

      function openModal() {
        // Sync to current template
        modalCurrent = Math.max(
          0,
          TEMPLATES.findIndex((t) => t.id === currentTemplate),
        );
        renderModal();
        document.getElementById("tpl-modal-overlay").classList.add("open");
      }

      function closeModal() {
        document.getElementById("tpl-modal-overlay").classList.remove("open");
      }

      function applyTemplate(id) {
        closeModal();
        currentTemplate = id;
        localStorage.setItem("selectedTemplate", id);
        loadTemplate(id);
      }

      function bindChangeTplButton() {
        document
          .getElementById("btn-change-tpl")
          ?.addEventListener("click", openModal);
      }

      // ══════════════════════════════════════════════════════════
      //  PDF DOWNLOAD
      // ══════════════════════════════════════════════════════════
      function bindDownload() {
        btnDownload?.addEventListener("click", async () => {
          if (typeof html2pdf === "undefined") {
            alert("PDF library not loaded. Check lib/html2pdf.bundle.min.js.");
            return;
          }
          const data = collectData();
          const first = (data.firstName || "").trim();
          const last = (data.lastName || "").trim();
          const name = [first, last].filter(Boolean).join("_") || "CV";

          btnDownload.textContent = "Exporting…";
          btnDownload.disabled = true;

          try {
            const iDoc =
              iframe.contentDocument || iframe.contentWindow?.document;
            const clone = document.createElement("div");
            clone.innerHTML = iDoc.querySelector("body").innerHTML;
            clone.style.cssText =
              "width:794px;min-height:1123px;background:#fff;";

            const wrapper = document.createElement("div");
            wrapper.style.cssText =
              "position:fixed;left:-9999px;top:0;z-index:-1;";
            iDoc
              .querySelectorAll("style,link[rel='stylesheet']")
              .forEach((el) => wrapper.appendChild(el.cloneNode(true)));
            wrapper.appendChild(clone);
            document.body.appendChild(wrapper);

            await html2pdf()
              .set({
                margin: 0,
                filename: `${name}_CV.pdf`,
                image: { type: "jpeg", quality: 0.98 },
                html2canvas: {
                  scale: 2,
                  useCORS: true,
                  backgroundColor: "#ffffff",
                },
                jsPDF: { unit: "mm", format: "a4", orientation: "portrait" },
                pagebreak: { mode: ["avoid-all", "css"] },
              })
              .from(clone)
              .save();

            document.body.removeChild(wrapper);
          } catch (err) {
            console.error(err);
            alert("PDF export failed. Try again.");
          } finally {
            btnDownload.innerHTML =
              '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg><span>Download PDF</span>';
            btnDownload.disabled = false;
          }
        });
      }

      // Expose for external use
      window.CVMaker = { collectData, scheduleUpdate };
    </script>
  </body>
</html>
