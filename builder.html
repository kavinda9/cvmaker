<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CV Builder — CV Maker</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <!-- Cropper.js CSS CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css" />
    <style>
      /* ═══════════════════════════════════════════════════════
       TOKENS
    ═══════════════════════════════════════════════════════ */
      :root {
        --bg: #111111;
        --bg-2: #161616;
        --bg-3: #1c1c1c;
        --surface: #222222;
        --surface-2: #2a2a2a;
        --border: #2e2e2e;
        --border-lt: #3a3a3a;
        --ink: #f0ede8;
        --ink-2: #9a9590;
        --ink-3: #555250;
        --accent: #c94a1f;
        --accent-lt: #e06040;
        --accent-dim: rgba(201, 74, 31, 0.15);
        --radius: 5px;
        --radius-lg: 8px;
        --topbar-h: 56px;
        --form-w: 420px;
        --ease: cubic-bezier(0.25, 0.46, 0.45, 0.94);
        --dur: 180ms;
        --font-brand: "Playfair Display", Georgia, serif;
        --font-body: "DM Sans", system-ui, sans-serif;
        --text-xs: 0.6875rem;
        --text-sm: 0.75rem;
        --text-base: 0.875rem;
      }

      /* ═══════════════════════════════════════════════════════
       RESET
    ═══════════════════════════════════════════════════════ */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        font-size: 16px;
      }
      body {
        font-family: var(--font-body);
        font-size: var(--text-base);
        color: var(--ink);
        background: var(--bg);
        height: 100dvh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      /* ═══════════════════════════════════════════════════════
       TOPBAR
    ═══════════════════════════════════════════════════════ */
      .topbar {
        height: var(--topbar-h);
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 1.5rem;
        background: var(--bg-2);
        border-bottom: 1px solid var(--border);
        z-index: 100;
      }

      .topbar__left {
        display: flex;
        align-items: center;
        gap: 1rem;
      }

      .topbar__back {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        color: var(--ink-3);
        text-decoration: none;
        font-size: var(--text-xs);
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        transition: color var(--dur);
        padding: 0.4rem 0.6rem;
        border-radius: var(--radius);
      }
      .topbar__back:hover {
        color: var(--ink);
      }

      .topbar__divider {
        width: 1px;
        height: 20px;
        background: var(--border-lt);
      }

      .topbar__brand {
        font-family: var(--font-brand);
        font-size: 1.1rem;
        font-weight: 700;
        color: var(--ink);
        letter-spacing: -0.01em;
        user-select: none;
      }
      .topbar__brand span {
        color: var(--accent);
      }

      .topbar__actions {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }

      /* Mobile preview toggle */
      .btn-toggle-preview {
        display: none;
        align-items: center;
        gap: 0.4rem;
        padding: 0 1rem;
        height: 34px;
        border-radius: var(--radius);
        border: 1px solid var(--border-lt);
        background: transparent;
        color: var(--ink-2);
        font-family: var(--font-body);
        font-size: var(--text-xs);
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        cursor: pointer;
        transition: all var(--dur) var(--ease);
      }
      .btn-toggle-preview:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      @media (max-width: 768px) {
        .btn-toggle-preview {
          display: inline-flex;
        }
        .workspace {
          grid-template-columns: 1fr;
        }
        /* default: show form, hide preview */
        .panel--preview {
          display: none;
        }
        /* toggled: hide form, show preview */
        .workspace.show-preview .panel--form {
          display: none;
        }
        .workspace.show-preview .panel--preview {
          display: flex;
        }
      }

      .btn-download {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0 1.25rem;
        height: 34px;
        border-radius: var(--radius);
        border: none;
        background: var(--accent);
        color: #fff;
        font-family: var(--font-body);
        font-size: var(--text-xs);
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        cursor: pointer;
        transition:
          background var(--dur),
          box-shadow var(--dur),
          gap var(--dur);
        box-shadow: 0 2px 12px rgba(201, 74, 31, 0.3);
        white-space: nowrap;
      }
      .btn-download:hover {
        background: var(--accent-lt);
        box-shadow: 0 4px 20px rgba(201, 74, 31, 0.45);
        gap: 0.7rem;
      }
      .btn-download:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      /* ═══════════════════════════════════════════════════════
       WORKSPACE
    ═══════════════════════════════════════════════════════ */
      .workspace {
        flex: 1;
        display: grid;
        grid-template-columns: var(--form-w) 1fr;
        overflow: hidden;
      }

      /* ═══════════════════════════════════════════════════════
       FORM PANEL
    ═══════════════════════════════════════════════════════ */
      .panel--form {
        background: var(--bg-2);
        border-right: 1px solid var(--border);
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        scrollbar-width: thin;
        scrollbar-color: var(--border-lt) transparent;
      }
      .panel--form::-webkit-scrollbar {
        width: 4px;
      }
      .panel--form::-webkit-scrollbar-thumb {
        background: var(--border-lt);
        border-radius: 99px;
      }

      /* Section accordion style */
      .form-section {
        border-bottom: 1px solid var(--border);
      }

      /* Hidden sections (controlled by showSections) */
      .form-section[data-section-id].section-hidden {
        display: none;
      }

      .section-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 1rem 1.25rem;
        cursor: pointer;
        user-select: none;
        transition: background var(--dur);
      }
      .section-header:hover {
        background: var(--surface);
      }

      .section-header__left {
        display: flex;
        align-items: center;
        gap: 0.6rem;
      }

      .section-icon {
        width: 28px;
        height: 28px;
        border-radius: var(--radius);
        background: var(--surface-2);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.8rem;
        flex-shrink: 0;
      }

      .section-title {
        font-size: var(--text-sm);
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--ink-2);
      }

      .section-chevron {
        color: var(--ink-3);
        transition: transform var(--dur) var(--ease);
        flex-shrink: 0;
      }
      .form-section.open .section-chevron {
        transform: rotate(180deg);
      }

      .section-body {
        display: none;
        padding: 0 1.25rem 1.25rem;
        flex-direction: column;
        gap: 0.75rem;
      }
      .form-section.open .section-body {
        display: flex;
      }

      /* Add button */
      .btn-add {
        display: inline-flex;
        align-items: center;
        gap: 0.3rem;
        padding: 0.35rem 0.75rem;
        height: 26px;
        border-radius: var(--radius);
        border: 1px solid var(--border-lt);
        background: transparent;
        font-family: var(--font-body);
        font-size: var(--text-xs);
        font-weight: 600;
        letter-spacing: 0.06em;
        color: var(--ink-2);
        cursor: pointer;
        transition: all var(--dur) var(--ease);
      }
      .btn-add:hover {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }

      .section-header__right {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      /* ── Fields ─────────────────────────────────────────────── */
      .field-row {
        display: flex;
        gap: 0.6rem;
      }
      .field-row .field {
        flex: 1;
      }
      .field-row .field--half {
        flex: 0 0 80px;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 0.3rem;
      }

      .field label {
        font-size: var(--text-xs);
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--ink-3);
      }

      .field input,
      .field textarea,
      .field select {
        width: 100%;
        font-family: var(--font-body);
        font-size: var(--text-base);
        color: var(--ink);
        background: var(--surface);
        border: 1px solid var(--border-lt);
        border-radius: var(--radius);
        padding: 0.5rem 0.75rem;
        line-height: 1.5;
        transition:
          border-color var(--dur),
          background var(--dur),
          box-shadow var(--dur);
        outline: none;
        resize: vertical;
        appearance: none;
      }
      .field input::placeholder,
      .field textarea::placeholder {
        color: var(--ink-3);
        opacity: 0.6;
      }
      .field input:hover,
      .field textarea:hover,
      .field select:hover {
        border-color: var(--border-lt);
        background: var(--surface-2);
      }
      .field input:focus,
      .field textarea:focus,
      .field select:focus {
        border-color: var(--accent);
        background: var(--surface-2);
        box-shadow: 0 0 0 3px var(--accent-dim);
      }
      .field input[type="number"] {
        -moz-appearance: textfield;
        appearance: textfield;
      }
      .field input[type="number"]::-webkit-inner-spin-button {
        -webkit-appearance: none;
      }

      /* ── Skill slider ────────────────────────────────────────── */
      .skill-slider-row, .software-slider-row {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .skill-slider-row input[type="text"], .software-slider-row input[type="text"] {
        flex: 1;
        font-family: var(--font-body);
        font-size: var(--text-base);
        color: var(--ink);
        background: var(--surface);
        border: 1px solid var(--border-lt);
        border-radius: var(--radius);
        padding: 0.4rem 0.6rem;
        outline: none;
        transition:
          border-color var(--dur),
          background var(--dur);
      }
      .skill-slider-row input[type="text"]:focus, .software-slider-row input[type="text"]:focus {
        border-color: var(--accent);
        background: var(--surface-2);
        box-shadow: 0 0 0 3px var(--accent-dim);
      }
      .skill-slider-row input[type="range"], .software-slider-row input[type="range"] {
        flex: 1;
        accent-color: var(--accent);
        cursor: pointer;
        height: 4px;
        border-radius: 2px;
        background: var(--border-lt);
        outline: none;
        border: none;
        padding: 0;
        appearance: auto;
      }
      .skill-level-pct, .software-level-pct {
        font-size: var(--text-xs);
        font-weight: 700;
        color: var(--ink-2);
        min-width: 34px;
        text-align: right;
        font-variant-numeric: tabular-nums;
      }
      .btn-skill-remove, .btn-software-remove {
        width: 20px;
        height: 20px;
        border-radius: 3px;
        border: none;
        background: transparent;
        color: var(--ink-3);
        font-size: 10px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition:
          background var(--dur),
          color var(--dur);
        flex-shrink: 0;
      }
      .btn-skill-remove:hover, .btn-software-remove:hover {
        background: rgba(200, 50, 50, 0.15);
        color: #c55;
      }
      .skills-list, .software-list {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      /* ── Interest tags ───────────────────────────────────────── */
      .interests-list {
        display: flex;
        flex-direction: column;
        gap: 0.4rem;
      }
      .interest-entry {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        animation: slideIn 160ms var(--ease) both;
      }
      .interest-entry input {
        flex: 1;
        font-family: var(--font-body);
        font-size: var(--text-base);
        color: var(--ink);
        background: var(--surface);
        border: 1px solid var(--border-lt);
        border-radius: var(--radius);
        padding: 0.4rem 0.65rem;
        outline: none;
        transition:
          border-color var(--dur),
          background var(--dur);
      }
      .interest-entry input:focus {
        border-color: var(--accent);
        background: var(--surface-2);
        box-shadow: 0 0 0 3px var(--accent-dim);
      }
      .btn-interest-remove {
        width: 20px;
        height: 20px;
        border-radius: 3px;
        border: none;
        background: transparent;
        color: var(--ink-3);
        font-size: 10px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition:
          background var(--dur),
          color var(--dur);
        flex-shrink: 0;
      }
      .btn-interest-remove:hover {
        background: rgba(200, 50, 50, 0.15);
        color: #c55;
      }

      .hint {
        font-size: var(--text-xs);
        color: var(--ink-3);
        font-weight: 400;
        margin-left: 0.25rem;
      }

      /* ── Photo upload ────────────────────────────────────────── */
      .photo-row {
        display: flex;
        align-items: center;
        gap: 1rem;
      }
      .photo-circle {
        position: relative;
        width: 64px;
        height: 64px;
        border-radius: 50%;
        border: 2px dashed var(--border-lt);
        overflow: hidden;
        cursor: pointer;
        flex-shrink: 0;
        background: var(--surface);
        transition: border-color var(--dur);
      }
      .photo-circle:hover {
        border-color: var(--accent);
      }
      .photo-circle input {
        position: absolute;
        inset: 0;
        opacity: 0;
        cursor: pointer;
        width: 100%;
        height: 100%;
        z-index: 2;
      }
      .photo-circle__placeholder {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2px;
        pointer-events: none;
        z-index: 1;
      }
      .photo-circle__placeholder span {
        font-size: 0.55rem;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--ink-3);
      }
      #photo-preview-img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 50%;
        z-index: 1;
        display: none;
      }
      .btn-photo-remove {
        padding: 0.3rem 0.6rem;
        height: 24px;
        border-radius: var(--radius);
        border: 1px solid #422;
        background: transparent;
        color: #c55;
        font-size: var(--text-xs);
        font-weight: 600;
        cursor: pointer;
        display: none;
        transition: background var(--dur);
      }
      .btn-photo-remove:hover {
        background: rgba(200, 50, 50, 0.15);
      }

      /* ── Dynamic entries ─────────────────────────────────────── */
      .dyn-entries {
        display: flex;
        flex-direction: column;
        gap: 0.6rem;
      }
      .dyn-entry {
        background: var(--surface);
        border: 1px solid var(--border-lt);
        border-left: 3px solid var(--border-lt);
        border-radius: var(--radius);
        padding: 0.85rem;
        display: flex;
        flex-direction: column;
        gap: 0.6rem;
        animation: slideIn 160ms var(--ease) both;
        transition: border-left-color var(--dur);
      }
      .dyn-entry:focus-within {
        border-left-color: var(--accent);
      }
      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(-6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .dyn-entry__top {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .dyn-entry__label {
        font-size: var(--text-xs);
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--ink-3);
      }
      .dyn-entry__remove {
        width: 20px;
        height: 20px;
        border-radius: 3px;
        border: none;
        background: transparent;
        color: var(--ink-3);
        font-size: 10px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition:
          background var(--dur),
          color var(--dur);
      }
      .dyn-entry__remove:hover {
        background: rgba(200, 50, 50, 0.15);
        color: #c55;
      }

      /* ═══════════════════════════════════════════════════════
       PREVIEW PANEL
    ═══════════════════════════════════════════════════════ */
      .panel--preview {
        background: #0d0d0d;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* ── Customise toolbar (color + font) ───────────────────── */
      .customise-bar {
        display: flex;
        align-items: center;
        gap: 1.5rem;
        padding: 0.65rem 1.25rem;
        background: var(--bg-3);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
        flex-wrap: wrap;
      }

      .cbar-group {
        display: flex;
        align-items: center;
        gap: 0.6rem;
      }
      .cbar-label {
        font-size: var(--text-xs);
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--ink-3);
        white-space: nowrap;
      }

      /* Color picker */
      .color-picker-wrap {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .color-picker-btn {
        position: relative;
        width: 32px;
        height: 32px;
        border-radius: var(--radius);
        border: 2px solid var(--border-lt);
        cursor: pointer;
        overflow: hidden;
        transition:
          border-color var(--dur),
          transform 0.15s;
        flex-shrink: 0;
      }
      .color-picker-btn:hover {
        border-color: var(--ink-2);
        transform: scale(1.08);
      }
      .color-picker-btn input[type="color"] {
        position: absolute;
        inset: -4px;
        width: calc(100% + 8px);
        height: calc(100% + 8px);
        border: none;
        padding: 0;
        cursor: pointer;
        opacity: 0;
      }
      .color-picker-preview {
        position: absolute;
        inset: 2px;
        border-radius: 2px;
        pointer-events: none;
      }
      .color-hex {
        font-size: 0.65rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        color: var(--ink-2);
        font-family: monospace;
        min-width: 52px;
      }

      /* Font select */
      .font-select-wrap {
        position: relative;
      }
      .font-select-wrap::after {
        content: "▾";
        position: absolute;
        right: 0.6rem;
        top: 50%;
        transform: translateY(-50%);
        color: var(--ink-3);
        font-size: 0.65rem;
        pointer-events: none;
      }
      .font-select {
        appearance: none;
        -webkit-appearance: none;
        background: var(--surface);
        border: 1px solid var(--border-lt);
        border-radius: var(--radius);
        color: var(--ink);
        font-size: 0.8rem;
        padding: 0.35rem 1.75rem 0.35rem 0.65rem;
        cursor: pointer;
        outline: none;
        transition: border-color var(--dur);
        min-width: 140px;
      }
      .font-select:hover {
        border-color: var(--accent);
      }
      .font-select:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-dim);
      }
      .font-select option {
        background: #222;
        color: var(--ink);
        padding: 0.3rem;
      }

      /* Change template button */
      .btn-change-tpl {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0 0.9rem;
        height: 34px;
        border-radius: var(--radius);
        border: 1px solid var(--border-lt);
        background: transparent;
        color: var(--ink-2);
        font-family: var(--font-body);
        font-size: var(--text-xs);
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        cursor: pointer;
        transition: all var(--dur) var(--ease);
        white-space: nowrap;
      }
      .btn-change-tpl:hover {
        border-color: var(--ink-2);
        color: var(--ink);
      }

      /* ── Template switcher modal ─────────────────────────────── */
      .tpl-modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.85);
        backdrop-filter: blur(8px);
        z-index: 500;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.25s ease;
      }
      .tpl-modal-overlay.open {
        opacity: 1;
        pointer-events: all;
      }

      .tpl-modal {
        width: 100%;
        max-width: 900px;
        height: 80dvh;
        display: flex;
        flex-direction: column;
        gap: 0;
      }

      .tpl-modal__head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 1rem 1rem;
        flex-shrink: 0;
      }
      .tpl-modal__title {
        font-family: var(--font-brand);
        font-size: 1.2rem;
        font-weight: 700;
        color: var(--ink);
        letter-spacing: -0.01em;
      }
      .tpl-modal__title span {
        color: var(--accent);
      }
      .tpl-modal__close {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border: 1px solid var(--border-lt);
        background: transparent;
        color: var(--ink-2);
        font-size: 1rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all var(--dur);
      }
      .tpl-modal__close:hover {
        background: var(--surface-2);
        color: var(--ink);
      }

      /* Carousel inside modal */
      .tpl-modal__stage {
        flex: 1;
        display: grid;
        grid-template-columns: 56px 1fr 56px;
        align-items: center;
        overflow: hidden;
      }

      .modal-arrow {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border-lt);
        background: rgba(255, 255, 255, 0.04);
        color: var(--ink-2);
        cursor: pointer;
        margin: auto;
        transition: all 0.2s;
      }
      .modal-arrow:hover {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
      }
      .modal-arrow:active {
        transform: scale(0.93);
      }

      .modal-track {
        position: relative;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      .modal-card {
        position: absolute;
        border-radius: 3px;
        overflow: hidden;
        cursor: pointer;
        transition:
          transform 0.5s cubic-bezier(0.22, 1, 0.36, 1),
          opacity 0.5s cubic-bezier(0.22, 1, 0.36, 1),
          filter 0.5s ease,
          box-shadow 0.5s ease;
        will-change: transform, opacity;
      }
      .modal-card img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: top;
        user-select: none;
        pointer-events: none;
      }
      .modal-card.is-active {
        z-index: 3;
        opacity: 1;
        filter: brightness(1);
        transform: translateX(0) scale(1);
        box-shadow:
          0 30px 70px rgba(0, 0, 0, 0.7),
          0 0 0 1px rgba(255, 255, 255, 0.06),
          0 0 50px rgba(201, 74, 31, 0.12);
      }
      .modal-card.is-active:hover {
        box-shadow:
          0 35px 80px rgba(0, 0, 0, 0.8),
          0 0 0 1px rgba(201, 74, 31, 0.3),
          0 0 60px rgba(201, 74, 31, 0.2);
      }
      .modal-card.is-prev {
        z-index: 2;
        opacity: 0.3;
        filter: brightness(0.45);
        transform: translateX(-50%) scale(0.78) rotateY(8deg);
        pointer-events: none;
      }
      .modal-card.is-next {
        z-index: 2;
        opacity: 0.3;
        filter: brightness(0.45);
        transform: translateX(50%) scale(0.78) rotateY(-8deg);
        pointer-events: none;
      }
      .modal-card.is-hidden {
        z-index: 1;
        opacity: 0;
        pointer-events: none;
        transform: scale(0.7);
      }

      .modal-card.anim-enter-right {
        animation: mEnterR 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      .modal-card.anim-enter-left {
        animation: mEnterL 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      @keyframes mEnterR {
        from {
          transform: translateX(70%) scale(0.75);
          opacity: 0;
        }
        to {
          transform: translateX(0) scale(1);
          opacity: 1;
        }
      }
      @keyframes mEnterL {
        from {
          transform: translateX(-70%) scale(0.75);
          opacity: 0;
        }
        to {
          transform: translateX(0) scale(1);
          opacity: 1;
        }
      }

      /* Bottom of modal */
      .tpl-modal__bottom {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.75rem;
        padding: 1rem 1rem 0;
        flex-shrink: 0;
      }
      .modal-dots {
        display: flex;
        gap: 0.4rem;
        align-items: center;
      }
      .modal-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--border-lt);
        cursor: pointer;
        transition:
          background 0.3s,
          width 0.3s;
      }
      .modal-dot.active {
        background: var(--accent);
        width: 18px;
        border-radius: 3px;
      }

      .tpl-modal__label {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.1rem;
      }
      .tpl-modal__label-num {
        font-size: 0.6rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--accent);
        font-weight: 600;
      }
      .tpl-modal__label-name {
        font-family: var(--font-brand);
        font-size: 1.1rem;
        font-weight: 700;
        color: var(--ink);
      }

      .btn-use-tpl {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.65rem 2rem;
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: var(--radius);
        font-family: var(--font-body);
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        cursor: pointer;
        transition:
          background 0.2s,
          box-shadow 0.2s;
        box-shadow: 0 4px 16px rgba(201, 74, 31, 0.3);
      }
      .btn-use-tpl:hover {
        background: var(--accent-lt);
        box-shadow: 0 6px 24px rgba(201, 74, 31, 0.45);
      }

      /* ── iframe area ─────────────────────────────────────────── */
      .preview-area {
        flex: 1;
        overflow: auto;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding: 2rem;
        background-image: radial-gradient(circle, #2a2a2a 1px, transparent 1px);
        background-size: 20px 20px;
        scrollbar-width: thin;
        scrollbar-color: var(--border-lt) transparent;
      }
      .preview-area::-webkit-scrollbar {
        width: 5px;
      }
      .preview-area::-webkit-scrollbar-thumb {
        background: var(--border-lt);
        border-radius: 99px;
      }

      .preview-scale-wrap {
        width: 794px;
        min-height: 1123px;
        transform-origin: top center;
        transform: scale(var(--preview-scale, 0.75));
        margin-bottom: calc(
          (1123px * (1 - var(--preview-scale, 0.75))) * -1 + 2rem
        );
        background: #fff;
        box-shadow:
          0 20px 60px rgba(0, 0, 0, 0.6),
          0 0 0 1px rgba(255, 255, 255, 0.04);
        border-radius: 2px;
        overflow: hidden;
      }

      #cv-preview {
        display: block;
        width: 794px;
        min-height: 1123px;
        border: none;
      }

      /* ═══════════════════════════════════════════════════════
       MOBILE
    ═══════════════════════════════════════════════════════ */
      @media (max-width: 820px) {
        body {
          overflow: auto;
        }

        .workspace {
          grid-template-columns: 1fr;
          grid-template-rows: auto auto;
          overflow: visible;
          height: auto;
        }

        .panel--form {
          overflow: visible;
          height: auto;
          border-right: none;
          border-bottom: 1px solid var(--border);
        }

        .panel--preview {
          min-height: 80vw;
          overflow: visible;
        }

        .preview-area {
          padding: 1.25rem;
          overflow: visible;
        }

        .preview-scale-wrap {
          width: 100%;
          transform: none;
          margin-bottom: 0;
          min-height: auto;
        }

        #cv-preview {
          width: 100%;
          min-height: 500px;
        }

        .btn-toggle-preview {
          display: inline-flex;
        }

        .topbar {
          padding: 0 1rem;
        }

        .customise-bar {
          gap: 1rem;
          padding: 0.6rem 1rem;
        }
      }

      @media (max-width: 480px) {
        :root {
          --form-w: 100vw;
        }
        .btn-download span {
          display: none;
        }
        .customise-bar {
          gap: 0.75rem;
        }
        .font-pill {
          font-size: 0.6rem;
          padding: 0.2rem 0.5rem;
        }
      }

      /* ── Photo Crop Modal ────────────────────────────────────── */
      .crop-modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.85);
        backdrop-filter: blur(8px);
        z-index: 600;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.25s ease;
      }
      .crop-modal-overlay.open {
        opacity: 1;
        pointer-events: all;
      }
      .crop-modal {
        background: var(--bg-2);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        width: 90%;
        max-width: 480px;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
      }
      .crop-modal__header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 1rem 1.25rem;
        border-bottom: 1px solid var(--border);
      }
      .crop-modal__title {
        font-family: var(--font-brand);
        font-size: 1.1rem;
        font-weight: 700;
        color: var(--ink);
      }
      .crop-modal__close {
        background: transparent;
        border: none;
        color: var(--ink-2);
        font-size: 1.1rem;
        cursor: pointer;
        transition: color var(--dur);
      }
      .crop-modal__close:hover {
        color: var(--ink);
      }
      .crop-modal__body {
        padding: 1.25rem;
        background: #111;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .crop-container {
        width: 100%;
        height: 320px;
        max-height: 50dvh;
        overflow: hidden;
        border-radius: var(--radius);
        background: #181818;
      }
      .crop-container img {
        max-width: 100%;
        display: block;
      }
      .crop-modal__bottom {
        padding: 1rem 1.25rem;
        border-top: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }
      .crop-controls {
        display: flex;
        justify-content: center;
        gap: 0.75rem;
      }
      .btn-crop-control {
        width: 38px;
        height: 38px;
        border-radius: var(--radius);
        border: 1px solid var(--border-lt);
        background: var(--surface);
        color: var(--ink-2);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all var(--dur);
      }
      .btn-crop-control:hover {
        background: var(--surface-2);
        color: var(--ink);
        border-color: var(--accent);
      }
      .crop-actions {
        display: flex;
        justify-content: flex-end;
        gap: 0.75rem;
      }
      .btn-crop-cancel {
        padding: 0.5rem 1.25rem;
        border-radius: var(--radius);
        border: 1px solid var(--border-lt);
        background: transparent;
        color: var(--ink-2);
        font-family: var(--font-body);
        font-size: var(--text-xs);
        font-weight: 600;
        text-transform: uppercase;
        cursor: pointer;
        transition: all var(--dur);
      }
      .btn-crop-cancel:hover {
        background: var(--surface);
        color: var(--ink);
      }
      .btn-crop-apply {
        padding: 0.5rem 1.5rem;
        border-radius: var(--radius);
        border: none;
        background: var(--accent);
        color: #fff;
        font-family: var(--font-body);
        font-size: var(--text-xs);
        font-weight: 700;
        text-transform: uppercase;
        cursor: pointer;
        transition: background var(--dur);
      }
      .btn-crop-apply:hover {
        background: var(--accent-lt);
      }

      /* Cropper JS Circular Mask Override */
      .cropper-view-box,
      .cropper-face {
        border-radius: 50% !important;
        outline: none !important;
      }
      .cropper-view-box {
        outline: 2px solid var(--accent) !important;
        outline-color: var(--accent) !important;
      }
      .cropper-line, .cropper-point {
        display: none !important;
      }
      .cropper-bg {
        background-image: none !important;
        background-color: #181818 !important;
      }
    </style>
  </head>
  <body>
    <!-- ══ TOPBAR ════════════════════════════════════════════ -->
    <header class="topbar">
      <div class="topbar__left">
        <a href="template.html" class="topbar__back">
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
          >
            <path d="M19 12H5M12 5l-7 7 7 7" />
          </svg>
          Templates
        </a>
        <div class="topbar__divider"></div>
        <div class="topbar__brand"><span>CV</span> Maker</div>
      </div>
      <div class="topbar__actions">
        <button class="btn-toggle-preview" id="btn-toggle-preview">
          <svg
            width="13"
            height="13"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
          >
            <rect x="2" y="3" width="20" height="14" rx="2" />
            <path d="M8 21h8M12 17v4" />
          </svg>
          Preview
        </button>
        <button class="btn-change-tpl" id="btn-change-tpl">
          <svg
            width="13"
            height="13"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
          >
            <rect x="3" y="3" width="7" height="7" rx="1" />
            <rect x="14" y="3" width="7" height="7" rx="1" />
            <rect x="3" y="14" width="7" height="7" rx="1" />
            <rect x="14" y="14" width="7" height="7" rx="1" />
          </svg>
          Templates
        </button>
        <button class="btn-download" id="btn-download">
          <svg
            width="13"
            height="13"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
          >
            <path
              d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"
            />
          </svg>
          <span>Download PDF</span>
        </button>
      </div>
    </header>

    <!-- ══ WORKSPACE ═════════════════════════════════════════ -->
    <div class="workspace" id="workspace">
      <!-- ══ FORM PANEL ══════════════════════════════════════ -->
      <aside class="panel--form" id="form-panel">
        <!-- Personal Info -->
        <div class="form-section open" data-section-id="personal">
          <div class="section-header" data-toggle>
            <div class="section-header__left">
              <div class="section-icon">👤</div>
              <span class="section-title">Personal Info</span>
            </div>
            <svg
              class="section-chevron"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M6 9l6 6 6-6" />
            </svg>
          </div>
          <div class="section-body">
            <!-- Photo -->
            <div class="photo-row">
              <div class="photo-circle" id="photo-upload-area">
                <img id="photo-preview-img" src="" alt="Preview" />
                <div class="photo-circle__placeholder">
                  <span>📷</span>
                  <span>Photo</span>
                </div>
                <input id="f-photo" type="file" accept="image/*" />
              </div>
              <button class="btn-photo-remove" id="photo-remove">
                ✕ Remove
              </button>
            </div>
            <div class="field-row">
              <div class="field">
                <label for="f-firstName">First Name</label>
                <input
                  id="f-firstName"
                  type="text"
                  data-token="firstName"
                  placeholder="Ada"
                />
              </div>
              <div class="field">
                <label for="f-lastName">Last Name</label>
                <input
                  id="f-lastName"
                  type="text"
                  data-token="lastName"
                  placeholder="Lovelace"
                />
              </div>
            </div>
            <div class="field">
              <label for="f-jobTitle">Job Title</label>
              <input
                id="f-jobTitle"
                type="text"
                data-token="jobTitle"
                placeholder="Software Engineer"
              />
            </div>
            <div class="field-row">
              <div class="field">
                <label for="f-email">Email</label>
                <input
                  id="f-email"
                  type="email"
                  data-token="email"
                  placeholder="ada@example.com"
                />
              </div>
              <div class="field">
                <label for="f-phone">Phone</label>
                <input
                  id="f-phone"
                  type="text"
                  data-token="phone"
                  placeholder="+1 555 000 0000"
                />
              </div>
            </div>
            <div class="field-row">
              <div class="field">
                <label for="f-location">Location</label>
                <input
                  id="f-location"
                  type="text"
                  data-token="location"
                  placeholder="London, UK"
                />
              </div>
              <div class="field">
                <label for="f-linkedin">LinkedIn</label>
                <input
                  id="f-linkedin"
                  type="text"
                  data-token="linkedin"
                  placeholder="linkedin.com/in/ada"
                />
              </div>
            </div>

          </div>
        </div>

        <!-- Social Links -->
        <div class="form-section open" id="section-socials" data-section-id="socials">
          <div class="section-header" data-toggle>
            <div class="section-header__left">
              <div class="section-icon">🌐</div>
              <span class="section-title">Social Links</span>
            </div>
            <svg
              class="section-chevron"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M6 9l6 6 6-6" />
            </svg>
          </div>
          <div class="section-body">
            <div class="field-row">
              <div class="field">
                <label for="f-facebook">Facebook</label>
                <input
                  id="f-facebook"
                  type="text"
                  data-token="facebook"
                  placeholder="facebook.com/username"
                  value="facebook.com/ninalane"
                />

              <div class="field">
                <label for="f-instagram">Instagram</label>
                <input
                  id="f-instagram"
                  type="text"
                  data-token="instagram"
                  placeholder="instagram.com/username"
                  value="instagram.com/ninalane"
                />
              </div>
            </div>
            <div class="field-row">
              <div class="field">
                <label for="f-twitter">Twitter / X</label>
                <input
                  id="f-twitter"
                  type="text"
                  data-token="twitter"
                  placeholder="x.com/username"
                  value="x.com/ninalane"
                />
              </div>
              <div class="field">
                <label for="f-github">GitHub</label>
                <input
                  id="f-github"
                  type="text"
                  data-token="github"
                  placeholder="github.com/username"
                  value="github.com/ninalane"
                />
              </div>
            </div>

        <!-- Profile Summary -->
        <div class="form-section open" data-section-id="profile">
          <div class="section-header" data-toggle>
            <div class="section-header__left">
              <div class="section-icon">📝</div>
              <span class="section-title">Profile Summary</span>
            </div>
            <svg
              class="section-chevron"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M6 9l6 6 6-6" />
            </svg>
          </div>
          <div class="section-body">
            <div class="field">
              <textarea
                id="f-summary"
                data-token="summary"
                rows="4"
                placeholder="A brief paragraph about you…"
              ></textarea>
            </div>
          </div>
        </div>

        <!-- Experience -->
        <div
          class="form-section open"
          id="section-experience"
          data-section-id="experience"
        >
          <div class="section-header" data-toggle>
            <div class="section-header__left">
              <div class="section-icon">💼</div>
              <span class="section-title">Experience</span>
            </div>
            <div class="section-header__right">
              <button
                class="btn-add"
                data-add="experience"
                onclick="event.stopPropagation()"

                + Add
              </button>
              <svg
                class="section-chevron"
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M6 9l6 6 6-6" />
              </svg>
            </div>
          </div>
          <div class="section-body">
            <div class="dyn-entries" id="experience-entries"></div>
          </div>

        <!-- Education -->
        <div
          class="form-section open"
          id="section-education"
          data-section-id="education"
        >
          <div class="section-header" data-toggle>

                + Add
              </button>
              <svg
                class="section-chevron"
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M6 9l6 6 6-6" />
              </svg>
            </div>
          </div>
          <div class="section-body">
            <div class="dyn-entries" id="education-entries"></div>
          </div>
        </div>

        <!-- Skills -->
        <div class="form-section" data-section-id="skills">
          <div class="section-header" data-toggle>
            <div class="section-header__left">
              <div class="section-icon">⚡</div>
              <span class="section-title">Skills</span>
            </div>
            <div class="section-header__right">
              <button
                class="btn-add"
                id="btn-add-skill"
                onclick="event.stopPropagation()"
              >
                + Add
              </button>
              <svg
                class="section-chevron"
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M6 9l6 6 6-6" />
              </svg>
            </div>
          </div>
          <div class="section-body">
            <div class="skills-list" id="skills-list"></div>
          </div>
        </div>

        <!-- Software -->
        <div class="form-section" data-section-id="software">
          <div class="section-header" data-toggle>
            <div class="section-header__left">
              <div class="section-icon">💻</div>
              <span class="section-title">Software</span>
            </div>
            <div class="section-header__right">
              <button
                class="btn-add"
                id="btn-add-software"
                onclick="event.stopPropagation()"
              >
                + Add
              </button>
              <svg
                class="section-chevron"
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M6 9l6 6 6-6" />
              </svg>
            </div>
          </div>
          <div class="section-body">
            <div class="software-list" id="software-list"></div>
          </div>
        </div>

        <!-- Languages -->
        <div
          class="form-section"
          id="section-language"
          data-section-id="languages"
        >
          <div class="section-header" data-toggle>
            <div class="section-header__left">
              <div class="section-icon">🌐</div>
              <span class="section-title">Languages</span>
            </div>
            <div class="section-header__right">
              <button
                class="btn-add"
                data-add="language"
                onclick="event.stopPropagation()"
              >
                + Add
              </button>
              <svg
                class="section-chevron"
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M6 9l6 6 6-6" />
              </svg>
            </div>
          </div>
          <div class="section-body">
            <div class="dyn-entries" id="language-entries"></div>
          </div>
        </div>

        <!-- Interests -->
        <div class="form-section" data-section-id="interests">
          <div class="section-header" data-toggle>
            <div class="section-header__left">
              <div class="section-icon">✨</div>
              <span class="section-title">Interests</span>
            </div>
            <div class="section-header__right">
              <button
                class="btn-add"
                id="btn-add-interest"
                onclick="event.stopPropagation()"
              >
                + Add
              </button>
              <svg
                class="section-chevron"
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M6 9l6 6 6-6" />
              </svg>
            </div>
          </div>
          <div class="section-body">
            <div class="interests-list" id="interests-list"></div>
          </div>
        </div>

        <!-- Portfolio -->
        <div
          class="form-section"
          id="section-portfolio"
          data-section-id="portfolio"
        >
          <div class="section-header" data-toggle>
            <div class="section-header__left">
              <div class="section-icon">🗂️</div>
              <span class="section-title">Portfolio</span>
            </div>
            <div class="section-header__right">
              <button
                class="btn-add"
                data-add="portfolio"
                onclick="event.stopPropagation()"
              >
                + Add
              </button>
              <svg
                class="section-chevron"
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M6 9l6 6 6-6" />
              </svg>
            </div>
          </div>
          <div class="section-body">
            <div class="dyn-entries" id="portfolio-entries"></div>
          </div>
        </div>

        <!-- Certifications -->
        <div
          class="form-section"
          id="section-certifications"
          data-section-id="certifications"
        >
          <div class="section-header" data-toggle>
            <div class="section-header__left">
              <div class="section-icon">🏅</div>
              <span class="section-title">Certifications</span>
            </div>
            <div class="section-header__right">
              <button
                class="btn-add"
                data-add="certification"
                onclick="event.stopPropagation()"
              >
                + Add
              </button>
              <svg
                class="section-chevron"
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M6 9l6 6 6-6" />
              </svg>
            </div>
          </div>
          <div class="section-body">
            <div class="dyn-entries" id="certification-entries"></div>
          </div>
        </div>
      </aside>

      <!-- ══ PREVIEW PANEL ═══════════════════════════════════ -->
      <main class="panel--preview" id="preview-panel">
        <!-- Customise bar -->
        <div class="customise-bar">
          <div class="cbar-group">
            <span class="cbar-label">Color</span>
            <div class="color-picker-wrap">
              <div
                class="color-picker-btn"
                id="color-picker-btn"
                title="Pick accent color"
              >
                <div
                  class="color-picker-preview"
                  id="color-preview"
                  style="background: #c94a1f"
                ></div>
                <input type="color" id="color-input" value="#c94a1f" />
              </div>
              <span class="color-hex" id="color-hex">#C94A1F</span>
            </div>
          </div>
          <div class="cbar-group">
            <span class="cbar-label">Header Font</span>
            <div class="font-select-wrap">
              <select class="font-select" id="header-font-select">
              </select>
            </div>
          </div>
          <div class="cbar-group">
            <span class="cbar-label">Body Font</span>
            <div class="font-select-wrap">
              <select class="font-select" id="body-font-select">
              </select>
            </div>
          </div>
        </div>

        <!-- iframe preview -->
        <div class="preview-area" id="preview-area">
          <div class="preview-scale-wrap" id="preview-scale-wrap">
            <iframe
              id="cv-preview"
              title="CV Preview"
              src="about:blank"
            ></iframe>
          </div>
        </div>
      </main>
    </div>

    <!-- ══ DYNAMIC ENTRY TEMPLATES ════════════════════════════ -->
    <template id="tpl-experience">
      <div class="dyn-entry" data-type="experience">
        <div class="dyn-entry__top">
          <span class="dyn-entry__label">Experience</span>
          <button class="dyn-entry__remove" title="Remove">✕</button>
        </div>
        <div class="field-row">
          <div class="field">
            <label>Role</label
            ><input type="text" name="role" placeholder="Senior Engineer" />
          </div>
          <div class="field">
            <label>Company</label
            ><input type="text" name="company" placeholder="Acme Corp" />
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label>Location</label
            ><input type="text" name="location" placeholder="London, UK" />
          </div>
          <div class="field field--half">
            <label>Start</label
            ><input type="text" name="startDate" placeholder="Jan 2021" />
          </div>
          <div class="field field--half">
            <label>End</label
            ><input type="text" name="endDate" placeholder="Present" />
          </div>
        </div>
        <div class="field">
          <label>Description</label>
          <textarea
            name="description"
            rows="3"
            placeholder="Describe your responsibilities and achievements…"
          ></textarea>
        </div>
      </div>
    </template>

    <template id="tpl-education">
      <div class="dyn-entry" data-type="education">
        <div class="dyn-entry__top">
          <span class="dyn-entry__label">Education</span>
          <button class="dyn-entry__remove" title="Remove">✕</button>
        </div>
        <div class="field-row">
          <div class="field">
            <label>Degree</label
            ><input
              type="text"
              name="degree"
              placeholder="BSc Computer Science"
            />
          </div>
          <div class="field">
            <label>School</label
            ><input type="text" name="school" placeholder="MIT" />
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label>Location</label
            ><input type="text" name="location" placeholder="Cambridge, MA" />
          </div>
          <div class="field field--half">
            <label>Year</label
            ><input type="text" name="year" placeholder="2018" />
          </div>
          <div class="field">
            <label>Detail</label
            ><input
              type="text"
              name="detail"
              placeholder="First Class Honours"
            />
          </div>
        </div>
      </div>
    </template>

    <template id="tpl-language">
      <div class="dyn-entry" data-type="language">
        <div class="dyn-entry__top">
          <span class="dyn-entry__label">Language</span>
          <button class="dyn-entry__remove" title="Remove">✕</button>
        </div>
        <div class="field-row">
          <div class="field">
            <label>Language</label
            ><input type="text" name="name" placeholder="French" />
          </div>
          <div class="field field--half">
            <label>Level (1–5)</label
            ><input
              type="number"
              name="level"
              min="1"
              max="5"
              placeholder="4"
            />
          </div>
        </div>
      </div>
    </template>

    <template id="tpl-portfolio">
      <div class="dyn-entry" data-type="portfolio">
        <div class="dyn-entry__top">
          <span class="dyn-entry__label">Portfolio Item</span>
          <button class="dyn-entry__remove" title="Remove">✕</button>
        </div>
        <div class="field">
          <label>Project Name</label>
          <input type="text" name="name" placeholder="My Awesome Project" />
        </div>
        <div class="field">
          <label>Description</label>
          <textarea
            name="description"
            rows="2"
            placeholder="Short description of the project…"
          ></textarea>
        </div>
      </div>
    </template>

    <template id="tpl-certification">
      <div class="dyn-entry" data-type="certification">
        <div class="dyn-entry__top">
          <span class="dyn-entry__label">Certification</span>
          <button class="dyn-entry__remove" title="Remove">✕</button>
        </div>
        <div class="field-row">
          <div class="field">
            <label>Name</label
            ><input
              type="text"
              name="name"
              placeholder="AWS Solutions Architect"
            />
          </div>
          <div class="field field--half">
            <label>Year</label
            ><input type="text" name="year" placeholder="2023" />
          </div>
        </div>
      </div>
    </template>

    <!-- ══ TEMPLATE SWITCHER MODAL ═══════════════════════════ -->
    <div class="tpl-modal-overlay" id="tpl-modal-overlay">
      <div class="tpl-modal">
        <div class="tpl-modal__head">
          <div class="tpl-modal__title">Choose <span>Template</span></div>
          <button class="tpl-modal__close" id="modal-close">✕</button>
        </div>
        <div class="tpl-modal__stage">
          <button class="modal-arrow" id="modal-prev">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
            >
              <path d="M15 18l-6-6 6-6" />
            </svg>
          </button>
          <div class="modal-track" id="modal-track"></div>
          <button class="modal-arrow" id="modal-next">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
            >
              <path d="M9 18l6-6-6-6" />
            </svg>
          </button>
        </div>
        <div class="tpl-modal__bottom">
          <div class="modal-dots" id="modal-dots"></div>
          <div class="tpl-modal__label">
            <span class="tpl-modal__label-num" id="modal-lbl-num"
              >Template 01</span
            >
            <span class="tpl-modal__label-name" id="modal-lbl-name"
              >Editorial</span
            >
          </div>
          <button class="btn-use-tpl" id="btn-use-tpl">
            Use This Template →
          </button>
        </div>
      </div>
    </div>

    <!-- ══ PHOTO CROP MODAL ═══════════════════════════════ -->
    <div class="crop-modal-overlay" id="crop-modal-overlay">
      <div class="crop-modal">
        <div class="crop-modal__header">
          <div class="crop-modal__title">Adjust Profile Photo</div>
          <button class="crop-modal__close" id="crop-modal-close">✕</button>
        </div>
        <div class="crop-modal__body">
          <div class="crop-container">
            <img id="crop-image" src="" alt="To Crop" />
          </div>
        </div>
        <div class="crop-modal__bottom">
          <div class="crop-controls">
            <button class="btn-crop-control" id="btn-crop-zoom-in" title="Zoom In">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                <line x1="11" y1="8" x2="11" y2="14"></line>
                <line x1="8" y1="11" x2="14" y2="11"></line>
              </svg>
            </button>
            <button class="btn-crop-control" id="btn-crop-zoom-out" title="Zoom Out">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                <line x1="8" y1="11" x2="14" y2="11"></line>
              </svg>
            </button>
            <button class="btn-crop-control" id="btn-crop-rotate-left" title="Rotate Left">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"></path>
              </svg>
            </button>
          </div>
          <div class="crop-actions">
            <button class="btn-crop-cancel" id="btn-crop-cancel">Cancel</button>
            <button class="btn-crop-apply" id="btn-crop-apply">Apply Crop</button>
          </div>
        </div>
      </div>
    </div>

    <!-- ══ SCRIPTS ══════════════════════════════════════════ -->
    <script src="lib/html2pdf.bundle.min.js"></script>
    <!-- Cropper.js JS CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>
    <script src="js/builder.js"></script>
  </body>
</html>
