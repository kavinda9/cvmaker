<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CV Maker</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/form.css" />
    <link rel="stylesheet" href="css/templates.css" />
  </head>
  <body>
    <!-- ── Top bar ─────────────────────────────────────────── -->
    <header class="topbar">
      <div class="topbar__brand">
        <span class="topbar__logo">CV</span>
        <span class="topbar__name">Maker</span>
      </div>
      <div class="topbar__actions">
        <button class="btn btn--ghost" id="btn-preview-toggle">Preview</button>
        <button class="btn btn--primary" id="btn-download">Download PDF</button>
      </div>
    </header>

    <!-- ── Main layout ─────────────────────────────────────── -->
    <div class="workspace">
      <!-- ══ FORM PANEL ══════════════════════════════════════ -->
      <aside class="panel panel--form" id="form-panel">
        <!-- Template picker -->
        <div class="form-section">
          <div class="form-section__label">Template</div>
          <div class="template-picker" id="template-picker">
            <button class="tpl-btn active" data-tpl="cv001">
              <span class="tpl-btn__num">01</span>
              <span class="tpl-btn__name">Editorial</span>
            </button>
            <!-- More templates appear here as you add cv002.html etc. -->
          </div>
        </div>

        <!-- ── Personal info ──────────────────────────────── -->
        <div class="form-section">
          <div class="form-section__label">Personal Info</div>

          <div class="field-row">
            <div class="field">
              <label for="f-firstName">First Name</label>
              <input
                id="f-firstName"
                type="text"
                data-token="firstName"
                placeholder="Ada"
              />
            </div>
            <div class="field">
              <label for="f-lastName">Last Name</label>
              <input
                id="f-lastName"
                type="text"
                data-token="lastName"
                placeholder="Lovelace"
              />
            </div>
          </div>

          <div class="field">
            <label for="f-jobTitle">Job Title</label>
            <input
              id="f-jobTitle"
              type="text"
              data-token="jobTitle"
              placeholder="Software Engineer"
            />
          </div>

          <div class="field-row">
            <div class="field">
              <label for="f-email">Email</label>
              <input
                id="f-email"
                type="email"
                data-token="email"
                placeholder="ada@example.com"
              />
            </div>
            <div class="field">
              <label for="f-phone">Phone</label>
              <input
                id="f-phone"
                type="text"
                data-token="phone"
                placeholder="+1 555 000 0000"
              />
            </div>
          </div>

          <div class="field-row">
            <div class="field">
              <label for="f-location">Location</label>
              <input
                id="f-location"
                type="text"
                data-token="location"
                placeholder="London, UK"
              />
            </div>
            <div class="field">
              <label for="f-linkedin">LinkedIn</label>
              <input
                id="f-linkedin"
                type="text"
                data-token="linkedin"
                placeholder="linkedin.com/in/ada"
              />
            </div>
          </div>

          <div class="field">
            <label for="f-website">Website</label>
            <input
              id="f-website"
              type="text"
              data-token="website"
              placeholder="ada.dev"
            />
          </div>
        </div>

        <!-- ── Summary ────────────────────────────────────── -->
        <div class="form-section">
          <div class="form-section__label">Profile Summary</div>
          <div class="field">
            <textarea
              id="f-summary"
              data-token="summary"
              rows="4"
              placeholder="A brief paragraph about you…"
            ></textarea>
          </div>
        </div>

        <!-- ── Experience ─────────────────────────────────── -->
        <div class="form-section" id="section-experience">
          <div class="form-section__header">
            <div class="form-section__label">Experience</div>
            <button class="btn-add" data-add="experience">+ Add</button>
          </div>
          <div id="experience-entries"></div>
        </div>

        <!-- ── Education ──────────────────────────────────── -->
        <div class="form-section" id="section-education">
          <div class="form-section__header">
            <div class="form-section__label">Education</div>
            <button class="btn-add" data-add="education">+ Add</button>
          </div>
          <div id="education-entries"></div>
        </div>

        <!-- ── Skills ─────────────────────────────────────── -->
        <div class="form-section">
          <div class="form-section__label">Skills</div>
          <div class="field">
            <label for="f-skillsTechnical"
              >Technical <span class="hint">comma-separated</span></label
            >
            <input
              id="f-skillsTechnical"
              type="text"
              data-token="skillsTechnical"
              placeholder="Python, TypeScript, SQL"
            />
          </div>
          <div class="field">
            <label for="f-skillsTools"
              >Tools <span class="hint">comma-separated</span></label
            >
            <input
              id="f-skillsTools"
              type="text"
              data-token="skillsTools"
              placeholder="Git, Docker, Figma"
            />
          </div>
        </div>

        <!-- ── Languages ──────────────────────────────────── -->
        <div class="form-section" id="section-languages">
          <div class="form-section__header">
            <div class="form-section__label">Languages</div>
            <button class="btn-add" data-add="language">+ Add</button>
          </div>
          <div id="language-entries"></div>
        </div>

        <!-- ── Interests ──────────────────────────────────── -->
        <div class="form-section">
          <div class="form-section__label">
            Interests <span class="hint">comma-separated</span>
          </div>
          <div class="field">
            <input
              id="f-interests"
              type="text"
              data-token="interests"
              placeholder="Open source, Piano, Rock climbing"
            />
          </div>
        </div>

        <!-- ── Certifications ─────────────────────────────── -->
        <div class="form-section" id="section-certifications">
          <div class="form-section__header">
            <div class="form-section__label">Certifications</div>
            <button class="btn-add" data-add="certification">+ Add</button>
          </div>
          <div id="certification-entries"></div>
        </div>
      </aside>
      <!-- /.panel--form -->

      <!-- ══ PREVIEW PANEL ═══════════════════════════════════ -->
      <main class="panel panel--preview" id="preview-panel">
        <div class="preview-scale-wrapper">
          <iframe id="cv-preview" title="CV Preview" src="about:blank"></iframe>
        </div>
      </main>
    </div>
    <!-- /.workspace -->

    <!-- ── Dynamic entry templates (hidden) ────────────────── -->

    <!-- Experience entry -->
    <template id="tpl-experience">
      <div class="dyn-entry" data-type="experience">
        <div class="dyn-entry__header">
          <span class="dyn-entry__title">Experience</span>
          <button class="dyn-entry__remove" title="Remove">✕</button>
        </div>
        <div class="field-row">
          <div class="field">
            <label>Role</label>
            <input type="text" name="role" placeholder="Senior Engineer" />
          </div>
          <div class="field">
            <label>Company</label>
            <input type="text" name="company" placeholder="Acme Corp" />
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label>Location</label>
            <input type="text" name="location" placeholder="London, UK" />
          </div>
          <div class="field field--half">
            <label>Start</label>
            <input type="text" name="startDate" placeholder="Jan 2021" />
          </div>
          <div class="field field--half">
            <label>End</label>
            <input type="text" name="endDate" placeholder="Present" />
          </div>
        </div>
        <div class="field">
          <label>Bullet points <span class="hint">one per line</span></label>
          <textarea
            name="bullets"
            rows="3"
            placeholder="Led a team of 5 engineers…"
          ></textarea>
        </div>
      </div>
    </template>

    <!-- Education entry -->
    <template id="tpl-education">
      <div class="dyn-entry" data-type="education">
        <div class="dyn-entry__header">
          <span class="dyn-entry__title">Education</span>
          <button class="dyn-entry__remove" title="Remove">✕</button>
        </div>
        <div class="field-row">
          <div class="field">
            <label>Degree</label>
            <input
              type="text"
              name="degree"
              placeholder="BSc Computer Science"
            />
          </div>
          <div class="field">
            <label>School</label>
            <input type="text" name="school" placeholder="MIT" />
          </div>
        </div>
        <div class="field-row">
          <div class="field field--half">
            <label>Year</label>
            <input type="text" name="year" placeholder="2018" />
          </div>
          <div class="field">
            <label>Detail</label>
            <input
              type="text"
              name="detail"
              placeholder="First Class Honours"
            />
          </div>
        </div>
      </div>
    </template>

    <!-- Language entry -->
    <template id="tpl-language">
      <div class="dyn-entry" data-type="language">
        <div class="dyn-entry__header">
          <span class="dyn-entry__title">Language</span>
          <button class="dyn-entry__remove" title="Remove">✕</button>
        </div>
        <div class="field-row">
          <div class="field">
            <label>Language</label>
            <input type="text" name="name" placeholder="French" />
          </div>
          <div class="field field--half">
            <label>Level (1–5)</label>
            <input type="number" name="level" min="1" max="5" placeholder="4" />
          </div>
        </div>
      </div>
    </template>

    <!-- Certification entry -->
    <template id="tpl-certification">
      <div class="dyn-entry" data-type="certification">
        <div class="dyn-entry__header">
          <span class="dyn-entry__title">Certification</span>
          <button class="dyn-entry__remove" title="Remove">✕</button>
        </div>
        <div class="field-row">
          <div class="field">
            <label>Name</label>
            <input
              type="text"
              name="name"
              placeholder="AWS Solutions Architect"
            />
          </div>
          <div class="field field--half">
            <label>Year</label>
            <input type="text" name="year" placeholder="2023" />
          </div>
        </div>
      </div>
    </template>

    <!-- ── Scripts ─────────────────────────────────────────── -->
    <script src="lib/html2pdf.bundle.min.js"></script>
    <script src="js/script.js"></script>
    <script src="js/preview.js"></script>
    <script src="js/download.js"></script>
  </body>
</html>
