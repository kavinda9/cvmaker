<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CV Builder — CV Maker</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ═══════════════════════════════════════════════════════
       TOKENS
    ═══════════════════════════════════════════════════════ */
      :root {
        --bg: #111111;
        --bg-2: #161616;
        --bg-3: #1c1c1c;
        --surface: #222222;
        --surface-2: #2a2a2a;
        --border: #2e2e2e;
        --border-lt: #3a3a3a;
        --ink: #f0ede8;
        --ink-2: #9a9590;
        --ink-3: #555250;
        --accent: #c94a1f;
        --accent-lt: #e06040;
        --accent-dim: rgba(201, 74, 31, 0.15);
        --radius: 5px;
        --radius-lg: 8px;
        --topbar-h: 56px;
        --form-w: 420px;
        --ease: cubic-bezier(0.25, 0.46, 0.45, 0.94);
        --dur: 180ms;
        --font-brand: "Playfair Display", Georgia, serif;
        --font-body: "DM Sans", system-ui, sans-serif;
        --text-xs: 0.6875rem;
        --text-sm: 0.75rem;
        --text-base: 0.875rem;
      }

      /* ═══════════════════════════════════════════════════════
       RESET
    ═══════════════════════════════════════════════════════ */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        font-size: 16px;
      }
      body {
        font-family: var(--font-body);
        font-size: var(--text-base);
        color: var(--ink);
        background: var(--bg);
        height: 100dvh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      /* ═══════════════════════════════════════════════════════
       TOPBAR
    ═══════════════════════════════════════════════════════ */
      .topbar {
        height: var(--topbar-h);
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 1.5rem;
        background: var(--bg-2);
        border-bottom: 1px solid var(--border);
        z-index: 100;
      }

      .topbar__left {
        display: flex;
        align-items: center;
        gap: 1rem;
      }

      .topbar__back {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        color: var(--ink-3);
        text-decoration: none;
        font-size: var(--text-xs);
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        transition: color var(--dur);
        padding: 0.4rem 0.6rem;
        border-radius: var(--radius);
      }
      .topbar__back:hover {
        color: var(--ink);
      }

      .topbar__divider {
        width: 1px;
        height: 20px;
        background: var(--border-lt);
      }

      .topbar__brand {
        font-family: var(--font-brand);
        font-size: 1.1rem;
        font-weight: 700;
        color: var(--ink);
        letter-spacing: -0.01em;
        user-select: none;
      }
      .topbar__brand span {
        color: var(--accent);
      }

      .topbar__actions {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }

      /* Mobile preview toggle */
      .btn-toggle-preview {
        display: none;
        align-items: center;
        gap: 0.4rem;
        padding: 0 1rem;
        height: 34px;
        border-radius: var(--radius);
        border: 1px solid var(--border-lt);
        background: transparent;
        color: var(--ink-2);
        font-family: var(--font-body);
        font-size: var(--text-xs);
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        cursor: pointer;
        transition: all var(--dur) var(--ease);
      }
      .btn-toggle-preview:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      @media (max-width: 768px) {
        .btn-toggle-preview {
          display: inline-flex;
        }
        .workspace {
          grid-template-columns: 1fr;
        }
        /* default: show form, hide preview */
        .panel--preview {
          display: none;
        }
        /* toggled: hide form, show preview */
        .workspace.show-preview .panel--form {
          display: none;
        }
        .workspace.show-preview .panel--preview {
          display: flex;
        }
      }

      .btn-download {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0 1.25rem;
        height: 34px;
        border-radius: var(--radius);
        border: none;
        background: var(--accent);
        color: #fff;
        font-family: var(--font-body);
        font-size: var(--text-xs);
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        cursor: pointer;
        transition:
          background var(--dur),
          box-shadow var(--dur),
          gap var(--dur);
        box-shadow: 0 2px 12px rgba(201, 74, 31, 0.3);
        white-space: nowrap;
      }
      .btn-download:hover {
        background: var(--accent-lt);
        box-shadow: 0 4px 20px rgba(201, 74, 31, 0.45);
        gap: 0.7rem;
      }
      .btn-download:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      /* ═══════════════════════════════════════════════════════
       WORKSPACE
    ═══════════════════════════════════════════════════════ */
      .workspace {
        flex: 1;
        display: grid;
        grid-template-columns: var(--form-w) 1fr;
        overflow: hidden;
      }

      /* ═══════════════════════════════════════════════════════
       FORM PANEL
    ═══════════════════════════════════════════════════════ */
      .panel--form {
        background: var(--bg-2);
        border-right: 1px solid var(--border);
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        scrollbar-width: thin;
        scrollbar-color: var(--border-lt) transparent;
      }
      .panel--form::-webkit-scrollbar {
        width: 4px;
      }
      .panel--form::-webkit-scrollbar-thumb {
        background: var(--border-lt);
        border-radius: 99px;
      }

      /* Section accordion style */
      .form-section {
        border-bottom: 1px solid var(--border);
      }

      /* Hidden sections (controlled by showSections) */
      .form-section[data-section-id].section-hidden {
        display: none;
      }

      .section-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 1rem 1.25rem;
        cursor: pointer;
        user-select: none;
        transition: background var(--dur);
      }
      .section-header:hover {
        background: var(--surface);
      }

      .section-header__left {
        display: flex;
        align-items: center;
        gap: 0.6rem;
      }

      .section-icon {
        width: 28px;
        height: 28px;
        border-radius: var(--radius);
        background: var(--surface-2);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.8rem;
        flex-shrink: 0;
      }

      .section-title {
        font-size: var(--text-sm);
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--ink-2);
      }

      .section-chevron {
        color: var(--ink-3);
        transition: transform var(--dur) var(--ease);
        flex-shrink: 0;
      }
      .form-section.open .section-chevron {
        transform: rotate(180deg);
      }

      .section-body {
        display: none;
        padding: 0 1.25rem 1.25rem;
        flex-direction: column;
        gap: 0.75rem;
      }
      .form-section.open .section-body {
        display: flex;
      }

      /* Add button */
      .btn-add {
        display: inline-flex;
        align-items: center;
        gap: 0.3rem;
        padding: 0.35rem 0.75rem;
        height: 26px;
        border-radius: var(--radius);
        border: 1px solid var(--border-lt);
        background: transparent;
        font-family: var(--font-body);
        font-size: var(--text-xs);
        font-weight: 600;
        letter-spacing: 0.06em;
        color: var(--ink-2);
        cursor: pointer;
        transition: all var(--dur) var(--ease);
      }
      .btn-add:hover {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }

      .section-header__right {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      /* ── Fields ─────────────────────────────────────────────── */
      .field-row {
        display: flex;
        gap: 0.6rem;
      }
      .field-row .field {
        flex: 1;
      }
      .field-row .field--half {
        flex: 0 0 80px;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 0.3rem;
      }

      .field label {
        font-size: var(--text-xs);
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--ink-3);
      }

      .field input,
      .field textarea,
      .field select {
        width: 100%;
        font-family: var(--font-body);
        font-size: var(--text-base);
        color: var(--ink);
        background: var(--surface);
        border: 1px solid var(--border-lt);
        border-radius: var(--radius);
        padding: 0.5rem 0.75rem;
        line-height: 1.5;
        transition:
          border-color var(--dur),
          background var(--dur),
          box-shadow var(--dur);
        outline: none;
        resize: vertical;
        appearance: none;
      }
      .field input::placeholder,
      .field textarea::placeholder {
        color: var(--ink-3);
        opacity: 0.6;
      }
      .field input:hover,
      .field textarea:hover,
      .field select:hover {
        border-color: var(--border-lt);
        background: var(--surface-2);
      }
      .field input:focus,
      .field textarea:focus,
      .field select:focus {
        border-color: var(--accent);
        background: var(--surface-2);
        box-shadow: 0 0 0 3px var(--accent-dim);
      }
      .field input[type="number"] {
        -moz-appearance: textfield;
        appearance: textfield;
      }
      .field input[type="number"]::-webkit-inner-spin-button {
        -webkit-appearance: none;
      }

      /* ── Skill slider ────────────────────────────────────────── */
      .skill-slider-row {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .skill-slider-row input[type="text"] {
        flex: 1;
        font-family: var(--font-body);
        font-size: var(--text-base);
        color: var(--ink);
        background: var(--surface);
        border: 1px solid var(--border-lt);
        border-radius: var(--radius);
        padding: 0.4rem 0.6rem;
        outline: none;
        transition:
          border-color var(--dur),
          background var(--dur);
      }
      .skill-slider-row input[type="text"]:focus {
        border-color: var(--accent);
        background: var(--surface-2);
        box-shadow: 0 0 0 3px var(--accent-dim);
      }
      .skill-slider-row input[type="range"] {
        flex: 1;
        accent-color: var(--accent);
        cursor: pointer;
        height: 4px;
        border-radius: 2px;
        background: var(--border-lt);
        outline: none;
        border: none;
        padding: 0;
        appearance: auto;
      }
      .skill-level-pct {
        font-size: var(--text-xs);
        font-weight: 700;
        color: var(--ink-2);
        min-width: 34px;
        text-align: right;
        font-variant-numeric: tabular-nums;
      }
      .btn-skill-remove {
        width: 20px;
        height: 20px;
        border-radius: 3px;
        border: none;
        background: transparent;
        color: var(--ink-3);
        font-size: 10px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition:
          background var(--dur),
          color var(--dur);
        flex-shrink: 0;
      }
      .btn-skill-remove:hover {
        background: rgba(200, 50, 50, 0.15);
        color: #c55;
      }
      .skills-list {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      /* ── Interest tags ───────────────────────────────────────── */
      .interests-list {
        display: flex;
        flex-direction: column;
        gap: 0.4rem;
      }
      .interest-entry {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        animation: slideIn 160ms var(--ease) both;
      }
      .interest-entry input {
        flex: 1;
        font-family: var(--font-body);
        font-size: var(--text-base);
        color: var(--ink);
        background: var(--surface);
        border: 1px solid var(--border-lt);
        border-radius: var(--radius);
        padding: 0.4rem 0.65rem;
        outline: none;
        transition:
          border-color var(--dur),
          background var(--dur);
      }
      .interest-entry input:focus {
        border-color: var(--accent);
        background: var(--surface-2);
        box-shadow: 0 0 0 3px var(--accent-dim);
      }
      .btn-interest-remove {
        width: 20px;
        height: 20px;
        border-radius: 3px;
        border: none;
        background: transparent;
        color: var(--ink-3);
        font-size: 10px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition:
          background var(--dur),
          color var(--dur);
        flex-shrink: 0;
      }
      .btn-interest-remove:hover {
        background: rgba(200, 50, 50, 0.15);
        color: #c55;
      }

      .hint {
        font-size: var(--text-xs);
        color: var(--ink-3);
        font-weight: 400;
        margin-left: 0.25rem;
      }

      /* ── Photo upload ────────────────────────────────────────── */
      .photo-row {
        display: flex;
        align-items: center;
        gap: 1rem;
      }
      .photo-circle {
        position: relative;
        width: 64px;
        height: 64px;
        border-radius: 50%;
        border: 2px dashed var(--border-lt);
        overflow: hidden;
        cursor: pointer;
        flex-shrink: 0;
        background: var(--surface);
        transition: border-color var(--dur);
      }
      .photo-circle:hover {
        border-color: var(--accent);
      }
      .photo-circle input {
        position: absolute;
        inset: 0;
        opacity: 0;
        cursor: pointer;
        width: 100%;
        height: 100%;
        z-index: 2;
      }
      .photo-circle__placeholder {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2px;
        pointer-events: none;
        z-index: 1;
      }
      .photo-circle__placeholder span {
        font-size: 0.55rem;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--ink-3);
      }
      #photo-preview-img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 50%;
        z-index: 1;
        display: none;
      }
      .btn-photo-remove {
        padding: 0.3rem 0.6rem;
        height: 24px;
        border-radius: var(--radius);
        border: 1px solid #422;
        background: transparent;
        color: #c55;
        font-size: var(--text-xs);
        font-weight: 600;
        cursor: pointer;
        display: none;
        transition: background var(--dur);
      }
      .btn-photo-remove:hover {
        background: rgba(200, 50, 50, 0.15);
      }

      /* ── Dynamic entries ─────────────────────────────────────── */
      .dyn-entries {
        display: flex;
        flex-direction: column;
        gap: 0.6rem;
      }
      .dyn-entry {
        background: var(--surface);
        border: 1px solid var(--border-lt);
        border-left: 3px solid var(--border-lt);
        border-radius: var(--radius);
        padding: 0.85rem;
        display: flex;
        flex-direction: column;
        gap: 0.6rem;
        animation: slideIn 160ms var(--ease) both;
        transition: border-left-color var(--dur);
      }
      .dyn-entry:focus-within {
        border-left-color: var(--accent);
      }
      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(-6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .dyn-entry__top {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .dyn-entry__label {
        font-size: var(--text-xs);
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--ink-3);
      }
      .dyn-entry__remove {
        width: 20px;
        height: 20px;
        border-radius: 3px;
        border: none;
        background: transparent;
        color: var(--ink-3);
        font-size: 10px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition:
          background var(--dur),
          color var(--dur);
      }
      .dyn-entry__remove:hover {
        background: rgba(200, 50, 50, 0.15);
        color: #c55;
      }

      /* ═══════════════════════════════════════════════════════
       PREVIEW PANEL
    ═══════════════════════════════════════════════════════ */
      .panel--preview {
        background: #0d0d0d;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* ── Customise toolbar (color + font) ───────────────────── */
      .customise-bar {
        display: flex;
        align-items: center;
        gap: 1.5rem;
        padding: 0.65rem 1.25rem;
        background: var(--bg-3);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
        flex-wrap: wrap;
      }

      .cbar-group {
        display: flex;
        align-items: center;
        gap: 0.6rem;
      }
      .cbar-label {
        font-size: var(--text-xs);
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--ink-3);
        white-space: nowrap;
      }

      /* Color picker */
      .color-picker-wrap {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .color-picker-btn {
        position: relative;
        width: 32px;
        height: 32px;
        border-radius: var(--radius);
        border: 2px solid var(--border-lt);
        cursor: pointer;
        overflow: hidden;
        transition:
          border-color var(--dur),
          transform 0.15s;
        flex-shrink: 0;
      }
      .color-picker-btn:hover {
        border-color: var(--ink-2);
        transform: scale(1.08);
      }
      .color-picker-btn input[type="color"] {
        position: absolute;
        inset: -4px;
        width: calc(100% + 8px);
        height: calc(100% + 8px);
        border: none;
        padding: 0;
        cursor: pointer;
        opacity: 0;
      }
      .color-picker-preview {
        position: absolute;
        inset: 2px;
        border-radius: 2px;
        pointer-events: none;
      }
      .color-hex {
        font-size: 0.65rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        color: var(--ink-2);
        font-family: monospace;
        min-width: 52px;
      }

      /* Font select */
      .font-select-wrap {
        position: relative;
      }
      .font-select-wrap::after {
        content: "▾";
        position: absolute;
        right: 0.6rem;
        top: 50%;
        transform: translateY(-50%);
        color: var(--ink-3);
        font-size: 0.65rem;
        pointer-events: none;
      }
      .font-select {
        appearance: none;
        -webkit-appearance: none;
        background: var(--surface);
        border: 1px solid var(--border-lt);
        border-radius: var(--radius);
        color: var(--ink);
        font-size: 0.8rem;
        padding: 0.35rem 1.75rem 0.35rem 0.65rem;
        cursor: pointer;
        outline: none;
        transition: border-color var(--dur);
        min-width: 140px;
      }
      .font-select:hover {
        border-color: var(--accent);
      }
      .font-select:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-dim);
      }
      .font-select option {
        background: #222;
        color: var(--ink);
        padding: 0.3rem;
      }

      /* Change template button */
      .btn-change-tpl {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0 0.9rem;
        height: 34px;
        border-radius: var(--radius);
        border: 1px solid var(--border-lt);
        background: transparent;
        color: var(--ink-2);
        font-family: var(--font-body);
        font-size: var(--text-xs);
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        cursor: pointer;
        transition: all var(--dur) var(--ease);
        white-space: nowrap;
      }
      .btn-change-tpl:hover {
        border-color: var(--ink-2);
        color: var(--ink);
      }

      /* ── Template switcher modal ─────────────────────────────── */
      .tpl-modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.85);
        backdrop-filter: blur(8px);
        z-index: 500;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.25s ease;
      }
      .tpl-modal-overlay.open {
        opacity: 1;
        pointer-events: all;
      }

      .tpl-modal {
        width: 100%;
        max-width: 900px;
        height: 80dvh;
        display: flex;
        flex-direction: column;
        gap: 0;
      }

      .tpl-modal__head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 1rem 1rem;
        flex-shrink: 0;
      }
      .tpl-modal__title {
        font-family: var(--font-brand);
        font-size: 1.2rem;
        font-weight: 700;
        color: var(--ink);
        letter-spacing: -0.01em;
      }
      .tpl-modal__title span {
        color: var(--accent);
      }
      .tpl-modal__close {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border: 1px solid var(--border-lt);
        background: transparent;
        color: var(--ink-2);
        font-size: 1rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all var(--dur);
      }
      .tpl-modal__close:hover {
        background: var(--surface-2);
        color: var(--ink);
      }

      /* Carousel inside modal */
      .tpl-modal__stage {
        flex: 1;
        display: grid;
        grid-template-columns: 56px 1fr 56px;
        align-items: center;
        overflow: hidden;
      }

      .modal-arrow {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border-lt);
        background: rgba(255, 255, 255, 0.04);
        color: var(--ink-2);
        cursor: pointer;
        margin: auto;
        transition: all 0.2s;
      }
      .modal-arrow:hover {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
      }
      .modal-arrow:active {
        transform: scale(0.93);
      }

      .modal-track {
        position: relative;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      .modal-card {
        position: absolute;
        border-radius: 3px;
        overflow: hidden;
        cursor: pointer;
        transition:
          transform 0.5s cubic-bezier(0.22, 1, 0.36, 1),
          opacity 0.5s cubic-bezier(0.22, 1, 0.36, 1),
          filter 0.5s ease,
          box-shadow 0.5s ease;
        will-change: transform, opacity;
      }
      .modal-card img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: top;
        user-select: none;
        pointer-events: none;
      }
      .modal-card.is-active {
        z-index: 3;
        opacity: 1;
        filter: brightness(1);
        transform: translateX(0) scale(1);
        box-shadow:
          0 30px 70px rgba(0, 0, 0, 0.7),
          0 0 0 1px rgba(255, 255, 255, 0.06),
          0 0 50px rgba(201, 74, 31, 0.12);
      }
      .modal-card.is-active:hover {
        box-shadow:
          0 35px 80px rgba(0, 0, 0, 0.8),
          0 0 0 1px rgba(201, 74, 31, 0.3),
          0 0 60px rgba(201, 74, 31, 0.2);
      }
      .modal-card.is-prev {
        z-index: 2;
        opacity: 0.3;
        filter: brightness(0.45);
        transform: translateX(-50%) scale(0.78) rotateY(8deg);
        pointer-events: none;
      }
      .modal-card.is-next {
        z-index: 2;
        opacity: 0.3;
        filter: brightness(0.45);
        transform: translateX(50%) scale(0.78) rotateY(-8deg);
        pointer-events: none;
      }
      .modal-card.is-hidden {
        z-index: 1;
        opacity: 0;
        pointer-events: none;
        transform: scale(0.7);
      }

      .modal-card.anim-enter-right {
        animation: mEnterR 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      .modal-card.anim-enter-left {
        animation: mEnterL 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      @keyframes mEnterR {
        from {
          transform: translateX(70%) scale(0.75);
          opacity: 0;
        }
        to {
          transform: translateX(0) scale(1);
          opacity: 1;
        }
      }
      @keyframes mEnterL {
        from {
          transform: translateX(-70%) scale(0.75);
          opacity: 0;
        }
        to {
          transform: translateX(0) scale(1);
          opacity: 1;
        }
      }

      /* Bottom of modal */
      .tpl-modal__bottom {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.75rem;
        padding: 1rem 1rem 0;
        flex-shrink: 0;
      }
      .modal-dots {
        display: flex;
        gap: 0.4rem;
        align-items: center;
      }
      .modal-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--border-lt);
        cursor: pointer;
        transition:
          background 0.3s,
          width 0.3s;
      }
      .modal-dot.active {
        background: var(--accent);
        width: 18px;
        border-radius: 3px;
      }

      .tpl-modal__label {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.1rem;
      }
      .tpl-modal__label-num {
        font-size: 0.6rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--accent);
        font-weight: 600;
      }
      .tpl-modal__label-name {
        font-family: var(--font-brand);
        font-size: 1.1rem;
        font-weight: 700;
        color: var(--ink);
      }

      .btn-use-tpl {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.65rem 2rem;
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: var(--radius);
        font-family: var(--font-body);
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        cursor: pointer;
        transition:
          background 0.2s,
          box-shadow 0.2s;
        box-shadow: 0 4px 16px rgba(201, 74, 31, 0.3);
      }
      .btn-use-tpl:hover {
        background: var(--accent-lt);
        box-shadow: 0 6px 24px rgba(201, 74, 31, 0.45);
      }

      /* ── iframe area ─────────────────────────────────────────── */
      .preview-area {
        flex: 1;
        overflow: auto;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding: 2rem;
        background-image: radial-gradient(circle, #2a2a2a 1px, transparent 1px);
        background-size: 20px 20px;
        scrollbar-width: thin;
        scrollbar-color: var(--border-lt) transparent;
      }
      .preview-area::-webkit-scrollbar {
        width: 5px;
      }
      .preview-area::-webkit-scrollbar-thumb {
        background: var(--border-lt);
        border-radius: 99px;
      }

      .preview-scale-wrap {
        width: 794px;
        min-height: 1123px;
        transform-origin: top center;
        transform: scale(var(--preview-scale, 0.75));
        margin-bottom: calc(
          (1123px * (1 - var(--preview-scale, 0.75))) * -1 + 2rem
        );
        background: #fff;
        box-shadow:
          0 20px 60px rgba(0, 0, 0, 0.6),
          0 0 0 1px rgba(255, 255, 255, 0.04);
        border-radius: 2px;
        overflow: hidden;
      }

      #cv-preview {
        display: block;
        width: 794px;
        min-height: 1123px;
        border: none;
      }

      /* ═══════════════════════════════════════════════════════
       MOBILE
    ═══════════════════════════════════════════════════════ */
      @media (max-width: 820px) {
        body {
          overflow: auto;
        }

        .workspace {
          grid-template-columns: 1fr;
          grid-template-rows: auto auto;
          overflow: visible;
          height: auto;
        }

        .panel--form {
          overflow: visible;
          height: auto;
          border-right: none;
          border-bottom: 1px solid var(--border);
        }

        .panel--preview {
          min-height: 80vw;
          overflow: visible;
        }

        .preview-area {
          padding: 1.25rem;
          overflow: visible;
        }

        .preview-scale-wrap {
          width: 100%;
          transform: none;
          margin-bottom: 0;
          min-height: auto;
        }

        #cv-preview {
          width: 100%;
          min-height: 500px;
        }

        .btn-toggle-preview {
          display: inline-flex;
        }

        .topbar {
          padding: 0 1rem;
        }

        .customise-bar {
          gap: 1rem;
          padding: 0.6rem 1rem;
        }
      }

      @media (max-width: 480px) {
        :root {
          --form-w: 100vw;
        }
        .btn-download span {
          display: none;
        }
        .customise-bar {
          gap: 0.75rem;
        }
        .font-pill {
          font-size: 0.6rem;
          padding: 0.2rem 0.5rem;
        }
      }
    </style>
  </head>

      // ══════════════════════════════════════════════════════════
      //  LOCALSTORAGE PERSISTENCE
      // ══════════════════════════════════════════════════════════
      function saveFormState() {
        try {
          const state = {
            fields: {},
            skills: collectRawSkills(),
            interests: collectRawInterests(),
            experience: collectRawEntries("experience"),
            education: collectRawEntries("education"),
            language: collectRawEntries("language"),
            portfolio: collectRawEntries("portfolio"),

            photo: photoDataURL,
            accentColor,
            headerFont: currentHeaderFont,
            bodyFont: currentBodyFont,
          };
          document.querySelectorAll("[data-token]").forEach((el) => {
            if (el.value.trim()) state.fields[el.dataset.token] = el.value;
          });
          localStorage.setItem("cvFormState", JSON.stringify(state));
        } catch (e) {
          // storage may be full — silently ignore
        }
      }

      function restoreFormState() {
        try {
          const raw = localStorage.getItem("cvFormState");
          if (!raw) return false;
          const state = JSON.parse(raw);
          // Fields
          if (state.fields) {
            Object.entries(state.fields).forEach(([token, value]) => {
              const el = document.querySelector(`[data-token="${token}"]`);
              if (el) el.value = value;
            });
          }
          // Skills
          if (Array.isArray(state.skills)) {
            const list = document.getElementById("skills-list");
            list.innerHTML = "";
            state.skills.forEach(({ name, level }) => addSkillRow(name, level));
          }
          // Interests
          if (Array.isArray(state.interests)) {
            const list = document.getElementById("interests-list");
            list.innerHTML = "";
            state.interests.forEach(({ name }) => addInterestRow(name));
          }
          // Dynamic entries
          const dynTypes = [
            "experience",
            "education",
            "language",
            "portfolio",
            "certification",
          ];

            if (Array.isArray(state[type])) {
              const container = document.getElementById(`${type}-entries`);
              if (container) container.innerHTML = "";
              state[type].forEach((fields) => addEntryWithValues(type, fields));
            }
          });
          // Photo
          if (state.photo) {
            photoDataURL = state.photo;
            const preview = document.getElementById("photo-preview-img");
            const removeBtn = document.getElementById("photo-remove");
            if (preview) {
              preview.src = photoDataURL;
              preview.style.display = "block";

            if (preview) preview.style.background = accentColor;
            if (hex) hex.textContent = accentColor.toUpperCase();

          if (state.headerFont) {
            currentHeaderFont = state.headerFont;
            const sel = document.getElementById("header-font-select");

          }

            currentBodyFont = state.bodyFont;
            const sel = document.getElementById("body-font-select");
            if (sel) sel.value = currentBodyFont;
          }
          return true;
        } catch (e) {
          return false;

        return Array.from(document.querySelectorAll(".skill-slider-row")).map(
          (row) => ({
            name: row.querySelector("input[type='text']")?.value || "",
            level: parseInt(

            ),
          }),
        );
      }

      function collectRawInterests() {
        return Array.from(
          document.querySelectorAll(".interest-entry input"),
        ).map((el) => ({
          name: el.value,
        }));
      }

      function collectRawEntries(type) {
        const c = document.getElementById(`${type}-entries`);
        if (!c) return [];
        return Array.from(
          c.querySelectorAll(`.dyn-entry[data-type="${type}"]`),
        ).map((entry) => {
          const obj = {};
          entry.querySelectorAll("[name]").forEach((el) => {
            obj[el.name] = el.value;
          });
          return obj;
        });
      }

      //  BOOT

      // ══════════════════════════════════════════════════════════
      //  cvConfig READER — load sections & accent from template
      // ══════════════════════════════════════════════════════════
      function readCvConfig(tplWindow) {
        const config = tplWindow?.cvConfig;
        if (!config) return;

        // Set accent color from template default
        if (config.accent) {
          accentColor = config.accent;
          const input = document.getElementById("color-input");
          const preview = document.getElementById("color-preview");
          const hex = document.getElementById("color-hex");
          if (input) input.value = accentColor;
          if (preview) preview.style.background = accentColor;
          if (hex) hex.textContent = accentColor.toUpperCase();
        }

        // Show/hide sections based on template config
        if (Array.isArray(config.sections)) {
          showSections(config.sections);
        }
      }

      // ══════════════════════════════════════════════════════════
      //  showSections — hide/show form sections by template config
      // ══════════════════════════════════════════════════════════
      function showSections(allowedSections) {
        document.querySelectorAll("[data-section-id]").forEach((section) => {
          const id = section.dataset.sectionId;
          // personal is always shown
          if (id === "personal" || id === "profile") {
            section.classList.remove("section-hidden");
          } else if (allowedSections.includes(id)) {
            section.classList.remove("section-hidden");
          } else {
            section.classList.add("section-hidden");
          }
        });
      }

      // ══════════════════════════════════════════════════════════
      //  TEMPLATE LOADING
      // ══════════════════════════════════════════════════════════
      async function loadTemplate(name, applyDefaults = false) {
        try {
          const res = await fetch(`${TEMPLATES_DIR}${name}.html`);
          if (!res.ok) throw new Error(`${res.status}`);
          templateHTML = await res.text();

          // Read cvConfig from template via temp iframe
          const tempIframe = document.createElement("iframe");
          tempIframe.style.cssText =
            "position:fixed;left:-9999px;top:0;width:1px;height:1px;";
          document.body.appendChild(tempIframe);
          tempIframe.contentDocument.open();
          tempIframe.contentDocument.write(templateHTML);
          tempIframe.contentDocument.close();

          setTimeout(() => {
            readCvConfig(tempIframe.contentWindow);
            document.body.removeChild(tempIframe);
            scheduleUpdate();
          }, 300);
        } catch (e) {
          console.error("[CV Maker] loadTemplate failed:", e);
          const errHTML =
            "<body style='padding:40px;font-family:sans-serif;color:#666'><h2>Template not found</h2><p>Make sure <strong>templates/" +
            name +
            ".html<\/strong> exists.<\/p><\/body>";
          updateIframe(errHTML);
        }
      }

      // ══════════════════════════════════════════════════════════

      // ══════════════════════════════════════════════════════════
      //  DATA COLLECTION
      // ══════════════════════════════════════════════════════════
      function collectData() {
        const data = JSON.parse(JSON.stringify(DEFAULT_DATA));

        // Static tokens
        document.querySelectorAll("[data-token]").forEach((el) => {
          const v = el.value.trim();
          if (v) data[el.dataset.token] = v;
        });

        data.photo = photoDataURL || data.photo;

        // Skills — slider-based, filter empty names
        const skillRows = document.querySelectorAll(".skill-slider-row");
        if (skillRows.length) {
          const skills = Array.from(skillRows)
            .map((row) => ({
              name: row.querySelector("input[type='text']")?.value.trim() || "",
              level: parseInt(
                row.querySelector("input[type='range']")?.value || "80",
              ),
            }))
            .filter((s) => s.name !== "");
          if (skills.length) data.skills = skills;
        }

        // Interests — add/remove rows, filter empty
        const interestInputs = document.querySelectorAll(
          ".interest-entry input",
        );
        if (interestInputs.length) {
          const interests = Array.from(interestInputs)
            .map((el) => ({ name: el.value.trim() }))
            .filter((i) => i.name !== "");
          if (interests.length) data.interests = interests;
        }

        // Dynamic entries
        const dyns = [
          { key: "experience", type: "experience" },
          { key: "education", type: "education" },
          { key: "languages", type: "language" },
          { key: "portfolio", type: "portfolio" },
          { key: "certifications", type: "certification" },
        ];
        dyns.forEach(({ key, type }) => {
          const entries = collectEntries(type, (e) => {
            if (type === "experience") {
              const obj = {
                role: val(e, "role"),
                company: val(e, "company"),
                location: val(e, "location"),
                startDate: val(e, "startDate"),
                endDate: val(e, "endDate"),
                description: val(e, "description"),
              };
              // filter totally empty entries
              return obj.role || obj.company ? obj : null;
            } else if (type === "education") {
              const obj = {
                degree: val(e, "degree"),
                school: val(e, "school"),
                location: val(e, "location"),
                year: val(e, "year"),
                detail: val(e, "detail"),
              };
              return obj.degree || obj.school ? obj : null;
            } else if (type === "language") {
              const name = val(e, "name");
              if (!name) return null;
              const level = Math.min(
                5,
                Math.max(1, parseInt(val(e, "level")) || 3),
              );
              return {
                name,
                level,
                l1: level >= 1 ? "on" : "",
                l2: level >= 2 ? "on" : "",
                l3: level >= 3 ? "on" : "",
                l4: level >= 4 ? "on" : "",
                l5: level >= 5 ? "on" : "",
              };
            } else if (type === "portfolio") {
              const name = val(e, "name");
              if (!name) return null;
              return { name, description: val(e, "description") };
            } else if (type === "certification") {
              const name = val(e, "name");
              if (!name) return null;
              return { name, year: val(e, "year") };
            }
            return null;
          });
          const filtered = entries.filter(Boolean);
          if (filtered.length) data[key] = filtered;
        });

        return data;
      }

      const val = (p, n) => {
        const el = p.querySelector(`[name="${n}"]`);
        return el ? el.value.trim() : "";
      };

      function collectEntries(type, mapper) {
        const c = document.getElementById(`${type}-entries`);
        return c
          ? Array.from(
              c.querySelectorAll(`.dyn-entry[data-type="${type}"]`),
            ).map(mapper)
          : [];
      }

      // ══════════════════════════════════════════════════════════
      //  TEMPLATE RENDERER
      // ══════════════════════════════════════════════════════════
      function renderTemplate(html, data) {
        let out = html;
        // Inverted sections {{^key}}...{{/key}}
        out = out.replace(
          /\{\{\^(\w+)\}\}([\s\S]*?)\{\{\/\1\}\}/g,
          (_, key, inner) => {
            const v = data[key];
            if (!v || (Array.isArray(v) && !v.length)) return inner;
            return "";
          },
        );
        // Normal sections {{#key}}...{{/key}}
        out = out.replace(
          /\{\{#(\w+)\}\}([\s\S]*?)\{\{\/\1\}\}/g,
          (_, key, inner) => {
            const v = data[key];
            if (Array.isArray(v)) {
              if (!v.length) return "";
              return v.map((item) => renderBlock(inner, item, data)).join("");
            }
            if (v)
              return inner.replace(/\{\{(\w+)\}\}/g, (_, k) => {
                const x = data[k];
                if (x == null) return "";
                return Array.isArray(x)
                  ? x.map(esc).join(", ")
                  : esc(String(x));
              });
            return "";
          },
        );
        // Simple tokens
        out = out.replace(/\{\{(\w+)\}\}/g, (_, key) => {
          const v = data[key];
          if (v == null) return "";
          if (Array.isArray(v)) return v.map(esc).join(", ");
          if (key === "photo") return String(v);
          return esc(String(v));
        });
        return out;
      }

      function renderBlock(inner, item, root) {
        let b = inner;
        // Inverted inside block
        b = b.replace(/\{\{\^(\w+)\}\}([\s\S]*?)\{\{\/\1\}\}/g, (__, k, i2) => {
          const s = item[k] !== undefined ? item[k] : root[k];
          if (!s || (Array.isArray(s) && !s.length)) return i2;
          return "";
        });
        // Nested sections inside block
        b = b.replace(/\{\{#(\w+)\}\}([\s\S]*?)\{\{\/\1\}\}/g, (__, k, i2) => {
          const s = item[k] !== undefined ? item[k] : root[k];
          if (Array.isArray(s) && s.length)
            return s
              .map((x) =>
                i2.replace(/\{\{(\w+)\}\}/g, (_, kk) =>
                  esc(String(x[kk] !== undefined ? x[kk] : x)),
                ),
              )
              .join("");
          if (s)
            return i2.replace(/\{\{(\w+)\}\}/g, (_, kk) =>
              esc(
                String(
                  item[kk] !== undefined
                    ? item[kk]
                    : root[kk] !== undefined
                      ? root[kk]
                      : "",
                ),
              ),
            );
          return "";
        });
        // Simple tokens
        b = b.replace(/\{\{(\w+)\}\}/g, (__, k) => {
          const v =
            item[k] !== undefined
              ? item[k]
              : root[k] !== undefined
                ? root[k]
                : "";
          return Array.isArray(v) ? v.map(esc).join(", ") : esc(String(v));
        });
        return b;
      }

      function esc(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      // ══════════════════════════════════════════════════════════
      //  PREVIEW UPDATE
      // ══════════════════════════════════════════════════════════
      function scheduleUpdate() {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => {
          if (!templateHTML.trim()) return;
          let html = renderTemplate(templateHTML, collectData());
          html = injectCustomStyles(html);
          updateIframe(html);
        }, DEBOUNCE_MS);
      }

      function injectCustomStyles(html) {
        const headerFont = FONTS[currentHeaderFont] || FONTS.playfair;
        const bodyFont = FONTS[currentBodyFont] || FONTS.dmSans;
        const style = `
      <link rel="stylesheet" href="${headerFont.url}" />
      <link rel="stylesheet" href="${bodyFont.url}" />
      <style>
        :root {
          --accent-color: ${accentColor} !important;
          --yellow: ${accentColor} !important;
          --accent: ${accentColor} !important;
          --cv-accent: ${accentColor} !important;
        }
        body, html { font-family: ${bodyFont.display} !important; }
        .sidebar__name, .sb-section__title, .sec-title, h1, h2, h3 {
          font-family: ${headerFont.display} !important;
        }
      </style>
    `;
        return html.replace("</head>", style + "</head>");
      }

      function updateIframe(html) {
        const doc = iframe.contentDocument || iframe.contentWindow?.document;
        if (!doc) return;
        doc.open();
        doc.write(html);
        doc.close();
        setTimeout(fitScale, 60);
      }

      // ══════════════════════════════════════════════════════════
      //  SCALE FIT
      // ══════════════════════════════════════════════════════════
      function fitScale() {
        const areaW = previewArea.clientWidth - 64;
        const scale = Math.max(0.3, Math.min(1, areaW / 794));
        scaleWrap.style.setProperty("--preview-scale", scale);
        const scaledH = 1123 * scale;
        scaleWrap.style.marginBottom = `${scaledH - 1123 + 32}px`;
      }

      // ══════════════════════════════════════════════════════════
      //  ACCORDION
      // ══════════════════════════════════════════════════════════
      function bindAccordions() {
        document.querySelectorAll("[data-toggle]").forEach((header) => {
          header.addEventListener("click", () => {
            header.closest(".form-section").classList.toggle("open");
          });
        });
      }

      // ══════════════════════════════════════════════════════════
      //  DYNAMIC ENTRIES
      // ══════════════════════════════════════════════════════════
      function addEntry(type) {
        addEntryWithValues(type, {});
      }

      function addEntryWithValues(type, values) {
        const tpl = document.getElementById(`tpl-${type}`);
        const container = document.getElementById(`${type}-entries`);
        if (!tpl || !container) return;
        const clone = tpl.content.cloneNode(true);
        const entry = clone.querySelector(".dyn-entry");
        const count = container.querySelectorAll(".dyn-entry").length + 1;
        const lbl = entry.querySelector(".dyn-entry__label");
        if (lbl) lbl.textContent = `${cap(type)} ${count}`;

        // Restore field values
        Object.entries(values).forEach(([name, value]) => {
          const el = entry.querySelector(`[name="${name}"]`);
          if (el) el.value = value;
        });

        entry
          .querySelector(".dyn-entry__remove")
          .addEventListener("click", () => {
            entry.remove();
            renumber(type);
            saveFormState();
            scheduleUpdate();
          });
        entry.addEventListener("input", () => {
          saveFormState();
          scheduleUpdate();
        });
        container.appendChild(entry);
        const section = document.getElementById(`section-${type}`);
        if (section) section.classList.add("open");
      }

      function renumber(type) {
        const c = document.getElementById(`${type}-entries`);
        if (!c) return;
        c.querySelectorAll(".dyn-entry").forEach((el, i) => {
          const lbl = el.querySelector(".dyn-entry__label");
          if (lbl) lbl.textContent = `${cap(type)} ${i + 1}`;
        });
      }

      const cap = (s) => s.charAt(0).toUpperCase() + s.slice(1);

      function bindDynamicAddButtons() {
        document.querySelectorAll("[data-add]").forEach((btn) => {
          btn.addEventListener("click", (e) => {
            e.stopPropagation();
            addEntry(btn.dataset.add);
            saveFormState();
            scheduleUpdate();
          });
        });
        // Skills add button
        document
          .getElementById("btn-add-skill")
          ?.addEventListener("click", (e) => {
            e.stopPropagation();
            const section = e.target.closest(".form-section");
            if (section) section.classList.add("open");
            addSkillRow();
            saveFormState();
            scheduleUpdate();
          });
        // Interests add button
        document
          .getElementById("btn-add-interest")
          ?.addEventListener("click", (e) => {
            e.stopPropagation();
            const section = e.target.closest(".form-section");
            if (section) section.classList.add("open");
            addInterestRow();
            saveFormState();
            scheduleUpdate();
          });
      }

      // ══════════════════════════════════════════════════════════
      //  STATIC INPUTS
      // ══════════════════════════════════════════════════════════
      function bindStaticInputs() {
        document.querySelectorAll("[data-token]").forEach((el) => {
          el.addEventListener("input", () => {
            saveFormState();
            scheduleUpdate();
          });
        });
      }

      // ══════════════════════════════════════════════════════════
      //  PHOTO UPLOAD
      // ══════════════════════════════════════════════════════════
      function bindPhotoUpload() {
        const input = document.getElementById("f-photo");
        const preview = document.getElementById("photo-preview-img");
        const remove = document.getElementById("photo-remove");
        if (!input) return;
        input.addEventListener("change", () => {
          const file = input.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = (e) => {
            photoDataURL = e.target.result;
            if (preview) {
              preview.src = photoDataURL;
              preview.style.display = "block";
            }
            if (remove) remove.style.display = "inline-flex";
            saveFormState();
            scheduleUpdate();
          };
          reader.readAsDataURL(file);
        });
        remove?.addEventListener("click", () => {
          photoDataURL = "";
          input.value = "";
          if (preview) {
            preview.src = "";
            preview.style.display = "none";
          }
          remove.style.display = "none";
          saveFormState();
          scheduleUpdate();
        });
      }

      // ══════════════════════════════════════════════════════════
      //  COLOR PICKER
      // ══════════════════════════════════════════════════════════
      function bindColorPicker() {
        const input = document.getElementById("color-input");
        const preview = document.getElementById("color-preview");
        const hexLbl = document.getElementById("color-hex");
        if (!input) return;

        const apply = () => {
          accentColor = input.value;
          if (preview) preview.style.background = accentColor;
          if (hexLbl) hexLbl.textContent = accentColor.toUpperCase();
          saveFormState();
          scheduleUpdate();
        };

        input.addEventListener("input", apply);
        input.addEventListener("change", apply);

        document
          .getElementById("color-picker-btn")
          ?.addEventListener("click", () => input.click());
      }

      // ══════════════════════════════════════════════════════════
      //  FONT SELECT
      // ══════════════════════════════════════════════════════════
      function bindFontSelects() {
        const headerSel = document.getElementById("header-font-select");
        const bodySel = document.getElementById("body-font-select");
        if (!headerSel || !bodySel) return;

        headerSel.querySelectorAll("option").forEach((opt) => {
          const f = FONTS[opt.value];
          if (f) opt.style.fontFamily = f.display;
        });
        bodySel.querySelectorAll("option").forEach((opt) => {
          const f = FONTS[opt.value];
          if (f) opt.style.fontFamily = f.display;
        });

        const applyHeaderFont = () => {
          const f = FONTS[headerSel.value];
          if (f) headerSel.style.fontFamily = f.display;
        };
        const applyBodyFont = () => {
          const f = FONTS[bodySel.value];
          if (f) bodySel.style.fontFamily = f.display;
        };

        headerSel.addEventListener("change", () => {
          currentHeaderFont = headerSel.value;
          applyHeaderFont();
          saveFormState();
          scheduleUpdate();
        });
        bodySel.addEventListener("change", () => {
          currentBodyFont = bodySel.value;
          applyBodyFont();
          saveFormState();
          scheduleUpdate();
        });

        applyHeaderFont();
        applyBodyFont();
      }

      // ══════════════════════════════════════════════════════════
      //  TEMPLATE SWITCHER MODAL
      // ══════════════════════════════════════════════════════════
      const TEMPLATES = [
        {
          id: "cv001",
          name: "Editorial",
          num: "01",
          img: "assets/images/cv001.png",
        },
        {
          id: "cv002",
          name: "Minimal",
          num: "02",
          img: "assets/images/cv002.png",
        },
        {
          id: "cv003",
          name: "Executive",
          num: "03",
          img: "assets/images/cv003.png",
        },
      ];

      let modalCurrent = 0;
      let modalAnimating = false;
      let modalCards = [];

      function initModal() {
        const track = document.getElementById("modal-track");
        const dotsWrap = document.getElementById("modal-dots");
        if (!track) return;

        modalCurrent = Math.max(
          0,
          TEMPLATES.findIndex((t) => t.id === currentTemplate),
        );

        modalCards = TEMPLATES.map((tpl, i) => {
          const card = document.createElement("div");
          card.className = "modal-card";
          card.dataset.index = i;

          const img = document.createElement("img");
          img.src = tpl.img;
          img.alt = tpl.name;
          card.appendChild(img);

          card.addEventListener("click", () => {
            if (modalAnimating) return;
            if (parseInt(card.dataset.index) !== modalCurrent) return;
            applyTemplate(TEMPLATES[modalCurrent].id);
          });

          track.appendChild(card);
          return card;
        });

        sizeModalCards();
        window.addEventListener("resize", sizeModalCards);

        TEMPLATES.forEach((_, i) => {
          const d = document.createElement("div");
          d.className = "modal-dot" + (i === modalCurrent ? " active" : "");
          d.addEventListener("click", () =>
            modalGoTo(i, i > modalCurrent ? 1 : -1),
          );
          dotsWrap.appendChild(d);
        });

        renderModal();

        document
          .getElementById("modal-prev")
          ?.addEventListener("click", () =>
            modalGoTo(
              (modalCurrent - 1 + TEMPLATES.length) % TEMPLATES.length,
              -1,
            ),
          );
        document
          .getElementById("modal-next")
          ?.addEventListener("click", () =>
            modalGoTo((modalCurrent + 1) % TEMPLATES.length, 1),
          );

        document.addEventListener("keydown", (e) => {
          const overlay = document.getElementById("tpl-modal-overlay");
          if (!overlay.classList.contains("open")) return;
          if (e.key === "ArrowLeft")
            modalGoTo(
              (modalCurrent - 1 + TEMPLATES.length) % TEMPLATES.length,
              -1,
            );
          if (e.key === "ArrowRight")
            modalGoTo((modalCurrent + 1) % TEMPLATES.length, 1);
          if (e.key === "Escape") closeModal();
          if (e.key === "Enter") applyTemplate(TEMPLATES[modalCurrent].id);
        });

        let touchX = 0;
        track.addEventListener(
          "touchstart",
          (e) => {
            touchX = e.touches[0].clientX;
          },
          { passive: true },
        );
        track.addEventListener(
          "touchend",
          (e) => {
            const dx = e.changedTouches[0].clientX - touchX;
            if (Math.abs(dx) > 40)
              dx < 0
                ? modalGoTo((modalCurrent + 1) % TEMPLATES.length, 1)
                : modalGoTo(
                    (modalCurrent - 1 + TEMPLATES.length) % TEMPLATES.length,
                    -1,
                  );
          },
          { passive: true },
        );

        document
          .getElementById("btn-use-tpl")
          ?.addEventListener("click", () =>
            applyTemplate(TEMPLATES[modalCurrent].id),
          );

        document
          .getElementById("modal-close")
          ?.addEventListener("click", closeModal);
        document
          .getElementById("tpl-modal-overlay")
          ?.addEventListener("click", (e) => {
            if (e.target === e.currentTarget) closeModal();
          });
      }

      function sizeModalCards() {
        const track = document.getElementById("modal-track");
        if (!track || !modalCards.length) return;
        const h = Math.min(track.clientHeight * 0.9, 560);
        const w = Math.min(h / 1.4142, track.clientWidth * 0.5, 360);
        modalCards.forEach((c) => {
          c.style.width = Math.round(w) + "px";
          c.style.height = Math.round(w * 1.4142) + "px";
        });
      }

      function renderModal() {
        const n = TEMPLATES.length;
        const prev = (modalCurrent - 1 + n) % n;
        const next = (modalCurrent + 1) % n;
        const dots = document.querySelectorAll(".modal-dot");

        modalCards.forEach((c, i) => {
          c.classList.remove("is-active", "is-prev", "is-next", "is-hidden");
          if (i === modalCurrent) c.classList.add("is-active");
          else if (i === prev) c.classList.add("is-prev");
          else if (i === next) c.classList.add("is-next");
          else c.classList.add("is-hidden");
        });

        document.getElementById("modal-lbl-num").textContent =
          "Template " + TEMPLATES[modalCurrent].num;
        document.getElementById("modal-lbl-name").textContent =
          TEMPLATES[modalCurrent].name;
        dots.forEach((d, i) =>
          d.classList.toggle("active", i === modalCurrent),
        );
      }

      function modalGoTo(index, dir) {
        if (modalAnimating || index === modalCurrent) return;
        modalAnimating = true;

        const oldCard = modalCards[modalCurrent];
        const newCard = modalCards[index];

        oldCard.classList.remove("anim-enter-right", "anim-enter-left");
        newCard.classList.remove(
          "is-hidden",
          "is-prev",
          "is-next",
          "is-active",
          "anim-enter-right",
          "anim-enter-left",
        );
        newCard.classList.add(dir > 0 ? "anim-enter-right" : "anim-enter-left");

        modalCurrent = index;
        renderModal();

        setTimeout(() => {
          newCard.classList.remove("anim-enter-right", "anim-enter-left");
          modalAnimating = false;
        }, 520);
      }

      function openModal() {
        modalCurrent = Math.max(
          0,
          TEMPLATES.findIndex((t) => t.id === currentTemplate),
        );
        renderModal();
        document.getElementById("tpl-modal-overlay").classList.add("open");
      }

      function closeModal() {
        document.getElementById("tpl-modal-overlay").classList.remove("open");
      }

      function applyTemplate(id) {
        closeModal();
        currentTemplate = id;
        localStorage.setItem("selectedTemplate", id);
        loadTemplate(id);
      }

      function bindChangeTplButton() {
        document
          .getElementById("btn-change-tpl")
          ?.addEventListener("click", openModal);
      }

      // ══════════════════════════════════════════════════════════
      //  PDF DOWNLOAD — serialise the live iframe HTML → Blob →
      //  temp off-screen iframe → html2pdf on its <body>
      // ══════════════════════════════════════════════════════════
      function bindDownload() {
        btnDownload?.addEventListener("click", async () => {
          if (typeof html2pdf === "undefined") {
            alert("PDF library not loaded. Check lib/html2pdf.bundle.min.js.");
            return;
          }

          const data = collectData();
          const first = (data.firstName || "").trim();
          const last = (data.lastName || "").trim();
          const filename =
            ([first, last].filter(Boolean).join("_") || "CV") + "_CV.pdf";

          const originalHTML = btnDownload.innerHTML;
          btnDownload.textContent = "Exporting…";
          btnDownload.disabled = true;

          try {
            const liveDoc = document.getElementById("cv-preview").contentDocument;
            if (!liveDoc) throw new Error("Preview not ready.");

            const el = liveDoc.querySelector(".page");
            if (!el) throw new Error("No .page element found.");

            await html2pdf()
              .set({
                margin: 0,
                filename: filename,
                image: { type: "jpeg", quality: 1.0 },
                html2canvas: {
                  scale: 2,
                  useCORS: true,
                  backgroundColor: "#ffffff",
                  width: 794,
                  height: 1123,
                  scrollX: 0,
                  scrollY: 0,
                  logging: false,
                },
                jsPDF: {
                  unit: "px",
                  format: [794, 1123],
                  orientation: "portrait",
                  hotfixes: ["px_scaling"],
                },
              })
              .from(el)
              .save();
          } catch (err) {
            console.error("[CV Maker] PDF export failed:", err);
            alert("PDF export failed. Please try again.");
          } finally {
            btnDownload.innerHTML = originalHTML;
            btnDownload.disabled = false;
          }
        });
      }

      // Expose for external use
      window.CVMaker = { collectData, scheduleUpdate };
    </script>
  </body>
</html>
